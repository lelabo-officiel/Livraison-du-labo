<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const PALETTE    = ['#FF6B00','#00C4FF','#06D6A0','#FFD60A','#C77DFF','#FF4D6D'];
const DEADLINE_MS = 3 * 60 * 60 * 1000;
const STOP_MS     = 5 * 60 * 1000; // 5 min chez le client

// ── Algorithme ──────────────────────────────────────────────
function haversine(a, b) {
  if (!a?.lat || !b?.lat) return Infinity;
  const R = 6371, r = x => x * Math.PI / 180;
  const dLat = r(b.lat-a.lat), dLng = r(b.lng-a.lng);
  const aa = Math.sin(dLat/2)**2 + Math.cos(r(a.lat))*Math.cos(r(b.lat))*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(aa), Math.sqrt(1-aa));
}

function optimizeRoute(orders, startPos) {
  const ready = orders.filter(o => o.status !== 'done');
  if (ready.length <= 1) return ready;
  const now = Date.now();
  let rem = [...ready], route = [], pos = startPos || null;

  while (rem.length) {
    // Commandes "super urgentes" : attendent depuis plus de 3h ou deadline dans moins de 30min
    const superUrgent = rem.filter(o => now - o.addedAt > 3*60*60*1000 || o.deadline - now < 30*60*1000);
    // Commandes "normalement urgentes" : deadline dans moins de 80min
    const urgent = rem.filter(o => o.deadline - now < 80*60*1000);

    let pool;
    if (superUrgent.length > 0) {
      // Mode priorité : on exclut les nouvelles commandes (< 45min) sauf si pas le choix
      const veterans = rem.filter(o => now - o.addedAt > 45*60*1000);
      const candidates = veterans.length > 0 ? veterans : rem;
      pool = candidates.slice().sort((a,b) => a.deadline - b.deadline);
    } else if (urgent.length > 0) {
      pool = urgent.slice().sort((a,b) => a.deadline - b.deadline);
    } else {
      pool = rem.slice().sort((a,b) => a.deadline - b.deadline);
    }

    let pick;
    if (pos && pool.length > 1) {
      // Parmi les candidats dans une fenêtre de 25min, prendre le plus proche géo
      const win = pool.filter(o => o.deadline - pool[0].deadline < 25*60*1000);
      pick = win.reduce((best, o) => haversine(pos,o) < haversine(pos,best) ? o : best);
    } else pick = pool[0];

    route.push(pick); pos = pick; rem = rem.filter(o => o.id !== pick.id);
  }
  return route;
}

// ── Géocodage ───────────────────────────────────────────────
async function geocodeAddress(address) {
  const res = await fetch(
    `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(address)}&format=json&limit=1`,
    { headers: {'Accept-Language':'fr-FR','User-Agent':'LivraisonApp/1.0'} }
  );
  const data = await res.json();
  if (!data.length) throw new Error('non trouvée');
  return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon), displayName: data[0].display_name };
}

// ── ETAs via OSRM ───────────────────────────────────────────
async function calcETAs(route, startPos) {
  const result = new Array(route.length).fill(null);
  const stops = route.map((o,i) => ({i,o})).filter(({o}) => o.lat && o.lng);
  if (!stops.length) return result;
  try {
    const pts = startPos?.lat
      ? [[startPos.lng, startPos.lat], ...stops.map(({o}) => [o.lng, o.lat])]
      : stops.map(({o}) => [o.lng, o.lat]);
    let legs = [];
    if (pts.length >= 2) {
      const res = await fetch(`https://router.project-osrm.org/route/v1/driving/${pts.map(p=>p.join(',')).join(';')}?overview=false`);
      const data = await res.json();
      if (data.code === 'Ok') legs = data.routes[0].legs;
    }
    let t = Date.now();
    stops.forEach(({i}, idx) => {
      if (startPos?.lat) {
        t += (legs[idx]?.duration ?? 0) * 1000 + STOP_MS;
      } else {
        t += idx === 0 ? 10*60*1000 : (legs[idx-1]?.duration ?? 0)*1000 + STOP_MS;
      }
      result[i] = t;
    });
  } catch(e) {}
  return result;
}

function useETAs(route, startPos) {
  const [etas, setEtas] = useState([]);
  const key = route.map(o => `${o.id}:${o.lat??''}:${o.lng??''}`).join('|') + (startPos?`|${startPos.lat}`:'');
  useEffect(() => {
    setEtas(new Array(route.length).fill(null));
    if (!route.length) return;
    let dead = false;
    calcETAs(route, startPos).then(r => { if (!dead) setEtas(r); });
    return () => { dead = true; };
  }, [key]);
  return etas;
}

// ── Formatters ──────────────────────────────────────────────
const fmtTime = ts => new Date(ts).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
const fmtCountdown = d => {
  const ms = d - Date.now();
  if (ms <= 0) return 'EN RETARD';
  const h = Math.floor(ms/3600000), m = Math.floor((ms%3600000)/60000);
  return h > 0 ? `${h}h${String(m).padStart(2,'0')}` : `${m}min`;
};
const urgency = d => {
  const ms = d - Date.now();
  if (ms <= 0) return 'late'; if (ms < 45*60000) return 'critical';
  if (ms < 90*60000) return 'warn'; return 'ok';
};
const wazeUrl = o => o.lat && o.lng
  ? `https://waze.com/ul?ll=${o.lat},${o.lng}&navigate=yes`
  : `https://waze.com/ul?q=${encodeURIComponent(o.address)}&navigate=yes`;
const fmtEuro = v => v != null && v !== '' ? `${parseFloat(v).toFixed(2).replace('.',',')} €` : null;

// Convertit "HH:MM" en timestamp (aujourd'hui à cette heure)
function parseTimeToTs(str) {
  const parts = str.trim().replace('h',':').split(':');
  if (parts.length < 2) return null;
  const h = parseInt(parts[0]), m = parseInt(parts[1]);
  if (isNaN(h) || isNaN(m) || h > 23 || m > 59) return null;
  const d = new Date(); d.setHours(h, m, 0, 0);
  return d.getTime();
}

// ── Firebase ────────────────────────────────────────────────
const dbRef  = p => window._dbRef(window._db, p);
const dbUpd  = (p, v) => window._dbUpd(dbRef(p), v);
const dbPush = (p, v) => window._dbPush(dbRef(p), v);
const dbRem  = p => window._dbRem(dbRef(p));
const dbOn   = (p, cb) => window._dbOn(dbRef(p), s => cb(s.val()));

function Toast({ msg, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 2200); return () => clearTimeout(t); }, []);
  return <div className="toast">{msg}</div>;
}

// ══════════════════════════════════════════════════════════
// APP
// ══════════════════════════════════════════════════════════
function App() {
  const [fbReady,  setFbReady]  = useState(!!window._firebaseReady);
  const [drivers,  setDrivers]  = useState({});
  const [meetups,  setMeetups]  = useState({});
  const [orders,   setOrders]   = useState({});
  const [gpsPos,   setGpsPos]   = useState(null);
  const [screen,   setScreen]   = useState(() => {
    const h = window.location.hash;
    if (h.startsWith('#driver-')) return h.slice(1);
    if (h.startsWith('#track-'))  return h.slice(1);
    if (h.startsWith('#meetup-')) return h.slice(1);
    return 'admin';
  });
  const [toast, setToast] = useState('');
  const [, tick] = useState(0);

  useEffect(() => {
    if (!fbReady) window.addEventListener('firebaseReady', () => setFbReady(true));
  }, []);
  useEffect(() => { const t = setInterval(() => tick(n=>n+1), 30000); return ()=>clearInterval(t); }, []);
  useEffect(() => {
    if (!fbReady) return;
    dbOn('drivers', v => setDrivers(v || {}));
    dbOn('meetups', v => setMeetups(v || {}));
    dbOn('orders',  v => setOrders(v  || {}));
  }, [fbReady]);
  useEffect(() => {
    if (screen.startsWith('driver-') || screen.startsWith('track-') || screen.startsWith('meetup-'))
      window.location.hash = screen;
    else history.replaceState(null,'',window.location.pathname);
  }, [screen]);

  // ── Drivers ──
  async function addDriver(name) {
    if (!name.trim()) return;
    await dbPush('drivers', { name: name.trim(), color: PALETTE[Object.keys(drivers).length % PALETTE.length] });
  }
  async function removeDriver(id) {
    await dbRem(`drivers/${id}`);
    Object.entries(orders).forEach(([oid,o]) => { if (o.driverId===id) dbUpd(`orders/${oid}`,{driverId:null}); });
  }
  async function updateDriver(id, p) { await dbUpd(`drivers/${id}`, p); }

  // ── Meetups ──
  async function addMeetup(name) {
    if (!name.trim()) return;
    const color = PALETTE[(Object.keys(drivers).length + Object.keys(meetups).length) % PALETTE.length];
    await dbPush('meetups', { name: name.trim(), color });
  }
  async function removeMeetup(id) {
    await dbRem(`meetups/${id}`);
    Object.entries(orders).forEach(([oid,o]) => { if (o.meetupId===id) dbUpd(`orders/${oid}`,{meetupId:null}); });
  }
  async function updateMeetup(id, p) { await dbUpd(`meetups/${id}`, p); }

  // ── Orders ──
  async function updateOrder(id, p) { await dbUpd(`orders/${id}`, p); }
  async function deleteOrder(id) { await dbRem(`orders/${id}`); }

  function startPos(did) {
    const d = drivers[did];
    if (gpsPos) return gpsPos;
    const doneForDriver = Object.values(orders)
      .filter(o => o.driverId === did && o.status === 'done' && o.lat && o.lng)
      .sort((a,b) => (b.deliveredAt||b.addedAt) - (a.deliveredAt||a.addedAt));
    if (doneForDriver.length > 0) return { lat: doneForDriver[0].lat, lng: doneForDriver[0].lng };
    return d?.baseLat ? {lat: d.baseLat, lng: d.baseLng} : null;
  }
  function getRoute(did) {
    return optimizeRoute(
      Object.entries(orders).filter(([,o])=>o.driverId===did&&o.status!=='done').map(([id,o])=>({...o,id})),
      startPos(did)
    );
  }
  function getDone(did) {
    return Object.entries(orders).filter(([,o])=>o.driverId===did&&o.status==='done')
      .map(([id,o])=>({...o,id})).sort((a,b)=>b.addedAt-a.addedAt);
  }
  function getMeetupOrders(mid) {
    return Object.entries(orders).filter(([,o])=>o.meetupId===mid&&o.status!=='done')
      .map(([id,o])=>({...o,id})).sort((a,b)=>a.addedAt-b.addedAt);
  }
  function getMeetupDone(mid) {
    return Object.entries(orders).filter(([,o])=>o.meetupId===mid&&o.status==='done')
      .map(([id,o])=>({...o,id})).sort((a,b)=>b.addedAt-a.addedAt);
  }

  if (!fbReady) return (
    <div className="app"><div className="empty-txt" style={{marginTop:80}}>
      <div className="spin" style={{width:24,height:24,margin:'0 auto 12px'}}/> Connexion…
    </div></div>
  );

  const isDriverScreen = screen.startsWith('driver-');
  const isTrackScreen  = screen.startsWith('track-');
  const isMeetupScreen = screen.startsWith('meetup-');
  const driverId       = isDriverScreen ? screen.replace('driver-','') : null;
  const trackOrderId   = isTrackScreen  ? screen.replace('track-','')  : null;
  const meetupId       = isMeetupScreen ? screen.replace('meetup-','') : null;
  const curDriver      = driverId ? drivers[driverId] : null;
  const curMeetup      = meetupId ? meetups[meetupId] : null;
  const isDirectLink   = (isDriverScreen || isTrackScreen || isMeetupScreen) && !!window.location.hash;

  // Vue client tracking
  if (isTrackScreen && isDirectLink) {
    const order = orders[trackOrderId];
    if (!order) return (
      <div className="app">
        <header className="hdr"><span className="hdr-logo">LIVR<em>AI</em>SON</span></header>
        <div className="empty-txt" style={{marginTop:60}}>
          <div className="spin" style={{width:24,height:24,margin:'0 auto 12px'}}/> Chargement…
        </div>
      </div>
    );
    const did = order.driverId;
    const route = did ? getRoute(did) : [];
    const sp    = did ? startPos(did) : null;
    return (
      <div className="app">
        <header className="hdr"><span className="hdr-logo">LIVR<em>AI</em>SON</span></header>
        <CustomerView order={{...order, id:trackOrderId}} route={route} sp={sp}/>
      </div>
    );
  }

  // Vue livreur directe
  if (isDriverScreen && isDirectLink && curDriver) return (
    <div className="app">
      <header className="hdr"><span className="hdr-logo">LIVR<em>AI</em>SON</span></header>
      <DriverView driver={{...curDriver,id:driverId}} route={getRoute(driverId)} done={getDone(driverId)}
        sp={startPos(driverId)}
        onDone={(id,amt)=>updateOrder(id,{status:'done',amount:amt??null,deliveredAt:Date.now()})}
        onGpsUpdate={pos=>setGpsPos(pos)} onBack={null}/>
      {toast && <Toast msg={toast} onDone={()=>setToast('')}/>}
    </div>
  );

  // Vue meet up directe
  if (isMeetupScreen && isDirectLink && curMeetup) return (
    <div className="app">
      <header className="hdr"><span className="hdr-logo">LIVR<em>AI</em>SON</span></header>
      <MeetupView meetup={{...curMeetup,id:meetupId}}
        pending={getMeetupOrders(meetupId)} done={getMeetupDone(meetupId)}
        onDone={(id,amt)=>updateOrder(id,{status:'done',amount:amt??null,deliveredAt:Date.now()})}
        onBack={null}/>
      {toast && <Toast msg={toast} onDone={()=>setToast('')}/>}
    </div>
  );

  return (
    <div className="app">
      <header className="hdr">
        <span className="hdr-logo">LIVR<em>AI</em>SON</span>
        {isDriverScreen
          ? <button className="tab on" onClick={()=>setScreen('driver-select')}>← Retour</button>
          : <>
              <button className={`tab ${screen==='admin'?'on':''}`} onClick={()=>setScreen('admin')}>Admin</button>
              <button className={`tab ${screen==='history'?'on':''}`} onClick={()=>setScreen('history')}>📋</button>
              <button className={`tab ${screen==='driver-select'?'on':''}`} onClick={()=>setScreen('driver-select')}>Chauffeur</button>
            </>
        }
      </header>

      {screen==='admin' && (
        <AdminView drivers={drivers} meetups={meetups} orders={orders}
          getRoute={getRoute} getDone={getDone} startPos={startPos}
          getMeetupOrders={getMeetupOrders} getMeetupDone={getMeetupDone}
          addDriver={addDriver} removeDriver={removeDriver} updateDriver={updateDriver}
          addMeetup={addMeetup} removeMeetup={removeMeetup} updateMeetup={updateMeetup}
          updateOrder={updateOrder} deleteOrder={deleteOrder}
          resetAll={async()=>{
            const date = new Date().toLocaleDateString('fr-FR');
            const snap = { date, savedAt: Date.now(), orders: Object.values(orders) };
            await dbPush('history', snap);
            for(const id of Object.keys(orders)) await dbRem(`orders/${id}`);
          }}
          onToast={setToast}/>
      )}
      {screen==='history' && <HistoryView/>}
      {screen==='driver-select' && (
        <SelectDriver drivers={drivers} orders={orders} onSelect={id=>setScreen(`driver-${id}`)}/>
      )}
      {isDriverScreen && curDriver && (
        <DriverView driver={{...curDriver,id:driverId}} route={getRoute(driverId)} done={getDone(driverId)}
          sp={startPos(driverId)}
          onDone={(id,amt)=>updateOrder(id,{status:'done',amount:amt??null,deliveredAt:Date.now()})}
          onGpsUpdate={pos=>setGpsPos(pos)} onBack={()=>setScreen('driver-select')}/>
      )}
      {toast && <Toast msg={toast} onDone={()=>setToast('')}/>}
    </div>
  );
}

// ══════════════════════════════════════════════════════════
// ADMIN VIEW
// ══════════════════════════════════════════════════════════
function AdminView({ drivers, meetups, orders, getRoute, getDone, startPos, getMeetupOrders, getMeetupDone, addDriver, removeDriver, updateDriver, addMeetup, removeMeetup, updateMeetup, updateOrder, deleteOrder, resetAll, onToast }) {
  const [newName, setNewName] = useState('');
  const [newMeetupName, setNewMeetupName] = useState('');
  const [form, setForm] = useState({client:'',address:'',driverId:'',meetupId:'',note:''});
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');

  async function handleAdd() {
    if (!form.client.trim()) return;
    const isMeetup = !!form.meetupId;
    if (!isMeetup && !form.address.trim()) return;
    setLoading(true); setErr('');
    const ts = Date.now();
    const order = {
      client:form.client.trim(), address:form.address.trim(), note:form.note.trim(),
      driverId:form.driverId||null, meetupId:form.meetupId||null,
      addedAt:ts, deadline:ts+DEADLINE_MS,
      status:'pending', lat:null, lng:null, displayName:null
    };
    const pushed = await dbPush('orders', order);
    setForm({client:'',address:'',driverId:'',meetupId:'',note:''});
    if (!isMeetup && form.address.trim()) {
      try {
        const geo = await geocodeAddress(form.address.trim());
        await updateOrder(pushed.key, {lat:geo.lat, lng:geo.lng, displayName:geo.displayName});
      } catch(e) { setErr('GPS non trouvé — commande ajoutée quand même'); }
    }
    setLoading(false);
  }

  const unassigned = Object.entries(orders).filter(([,o])=>!o.driverId&&o.status!=='done');

  return (
    <div className="content">

      <div className="card">
        <div className="card-pad">
          <div className="sec-label">Nouvelle commande</div>
          <div className="fld">
            <label className="fld-lbl">Nom du client</label>
            <input className="inp" placeholder="Ex : Mohammed D." value={form.client}
              onChange={e=>setForm(f=>({...f,client:e.target.value}))}/>
          </div>
          <div className="fld">
            <label className="fld-lbl">Type</label>
            <select className="inp" value={form.meetupId ? 'meetup' : 'delivery'}
              onChange={e=>{ if(e.target.value==='delivery') setForm(f=>({...f,meetupId:''})); else setForm(f=>({...f,driverId:'',address:''})); }}>
              <option value="delivery">🛵 Livraison à domicile</option>
              <option value="meetup">📍 Meet up (sur place)</option>
            </select>
          </div>
          {!form.meetupId ? (
            <>
              <div className="fld">
                <label className="fld-lbl">Adresse de livraison</label>
                <input className="inp" placeholder="Ex : 14 rue de la Paix, Lyon" value={form.address}
                  onChange={e=>setForm(f=>({...f,address:e.target.value}))}
                  onKeyDown={e=>e.key==='Enter'&&handleAdd()}/>
              </div>
              <div className="fld">
                <label className="fld-lbl">Chauffeur</label>
                <select className="inp" value={form.driverId} onChange={e=>setForm(f=>({...f,driverId:e.target.value}))}>
                  <option value="">— Non assigné</option>
                  {Object.entries(drivers).map(([id,d])=><option key={id} value={id}>{d.name}</option>)}
                </select>
              </div>
            </>
          ) : (
            <div className="fld">
              <label className="fld-lbl">Point Meet up</label>
              <select className="inp" value={form.meetupId} onChange={e=>setForm(f=>({...f,meetupId:e.target.value}))}>
                <option value="">— Choisir un point</option>
                {Object.entries(meetups).map(([id,m])=><option key={id} value={id}>{m.name}</option>)}
              </select>
            </div>
          )}
          <div className="fld">
            <label className="fld-lbl">Message pour le livreur</label>
            <textarea className="inp" rows={3} value={form.note}
              placeholder="Ex : 2x burger, 1x frites — 24€ — code: 1492"
              onChange={e=>setForm(f=>({...f,note:e.target.value}))}
              style={{resize:'none',lineHeight:'1.5'}}/>
          </div>
          {loading && <div className="geocoding-row"><span className="spin"/> Localisation GPS…</div>}
          {err && <div className="err">⚠ {err}</div>}
          <button className="btn-main" onClick={handleAdd}
            disabled={!form.client.trim()||((!form.meetupId&&!form.address.trim()))||(form.meetupId===''&&!form.driverId&&!form.meetupId)||loading}>
            + Ajouter la commande
          </button>
        </div>
      </div>

      <div className="card">
        <div className="card-pad" style={{paddingBottom:0}}>
          <div className="sec-label">Chauffeurs ({Object.keys(drivers).length})</div>
        </div>
        {Object.keys(drivers).length===0 && <div className="empty-txt">Aucun chauffeur</div>}
        {Object.entries(drivers).map(([id,d])=>{
          const n = Object.values(orders).filter(o=>o.driverId===id&&o.status!=='done').length;
          const link = `${window.location.href.split('#')[0]}#driver-${id}`;
          return (
            <div key={id}>
              <div className="driver-row">
                <div className="dot" style={{background:d.color}}/>
                <span className="driver-row-name">{d.name}</span>
                <span className="driver-row-n">{n} cmd</span>
                <button className="btn-sm" style={{color:'#06D6A0'}} onClick={()=>{
                  navigator.clipboard.writeText(link); onToast('🔗 Lien copié !');
                }}>🔗 Lien</button>
                <button className="btn-sm btn-del" onClick={()=>removeDriver(id)}>✕</button>
              </div>
              <DriverBaseRow driver={{...d,id}} onUpdate={updateDriver}/>
            </div>
          );
        })}
        <div className="add-row">
          <input className="add-inp" placeholder="Prénom du chauffeur" value={newName}
            onChange={e=>setNewName(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter'&&newName.trim()){addDriver(newName);setNewName('');}}}/>
          <button className="btn-add" onClick={()=>{if(newName.trim()){addDriver(newName);setNewName('');}}}>+ Ajouter</button>
        </div>
      </div>

      {/* POINTS MEET UP */}
      <div className="card">
        <div className="card-pad" style={{paddingBottom:0}}>
          <div className="sec-label">📍 Points Meet up ({Object.keys(meetups).length})</div>
        </div>
        {Object.keys(meetups).length===0 && <div className="empty-txt">Aucun point meet up</div>}
        {Object.entries(meetups).map(([id,m])=>{
          const n = Object.values(orders).filter(o=>o.meetupId===id&&o.status!=='done').length;
          const link = `${window.location.href.split('#')[0]}#meetup-${id}`;
          const total = Object.values(orders).filter(o=>o.meetupId===id&&o.status==='done').reduce((s,o)=>s+(parseFloat(o.amount)||0),0);
          return (
            <div key={id}>
              <div className="driver-row">
                <div className="dot" style={{background:m.color}}/>
                <span className="driver-row-name">{m.name}</span>
                <span className="driver-row-n">{n} en attente</span>
                {total>0 && <span style={{fontFamily:'Space Mono,monospace',fontSize:10,color:'var(--ok)'}}>💰{fmtEuro(total)}</span>}
                <button className="btn-sm" style={{color:'#06D6A0'}} onClick={()=>{navigator.clipboard.writeText(link);onToast('🔗 Lien copié !');}}>🔗 Lien</button>
                <button className="btn-sm btn-del" onClick={()=>removeMeetup(id)}>✕</button>
              </div>
              {/* Stock meet up */}
              <MeetupStockRow meetup={{...m,id}} onUpdate={updateMeetup}/>
              {/* Clients en attente au meet up */}
              {getMeetupOrders(id).map(o=>(
                <div className="order-row" key={o.id} style={{background: o.status==='arrived'?'#001830':''}}>
                  <div className="o-num" style={{color: o.status==='arrived'?'#4FC3F7':'var(--accent)'}}>
                    {o.status==='arrived'?'✓':'⏳'}
                  </div>
                  <div className="o-body">
                    <div className="o-client">{o.client}</div>
                    {o.note && <div style={{fontSize:11,color:'#FFD60A'}}>📋 {o.note}</div>}
                    <div className="o-time">↓ {fmtTime(o.addedAt)}</div>
                  </div>
                  <div className="o-actions">
                    {o.status!=='arrived' ? (
                      <button className="btn-sm" style={{color:'#4FC3F7',whiteSpace:'nowrap'}}
                        onClick={()=>{
                          updateOrder(o.id,{status:'arrived'});
                          // Notification au meet up person
                          if(Notification.permission==='granted')
                            new Notification('📍 Client arrivé !',{body:`${o.client} est sur place`});
                        }}>Client arrivé</button>
                    ) : (
                      <span style={{fontSize:10,color:'#4FC3F7',fontWeight:700}}>Sur place</span>
                    )}
                    <button className="btn-sm btn-del" onClick={()=>deleteOrder(o.id)}>✕</button>
                  </div>
                </div>
              ))}
              {/* Livrés au meet up */}
              {getMeetupDone(id).map(o=>(
                <div className="order-row" key={o.id} style={{opacity:.4}}>
                  <div className="o-num" style={{color:'var(--ok)'}}>✓</div>
                  <div className="o-body">
                    <div className="o-client">{o.client}</div>
                    {o.amount!=null && <div style={{fontSize:10,color:'var(--ok)'}}>💰 {fmtEuro(o.amount)}</div>}
                  </div>
                  <button className="btn-sm btn-del" onClick={()=>deleteOrder(o.id)}>✕</button>
                </div>
              ))}
            </div>
          );
        })}
        <div className="add-row">
          <input className="add-inp" placeholder="Nom du point (ex: Boutique, Stand...)" value={newMeetupName}
            onChange={e=>setNewMeetupName(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter'&&newMeetupName.trim()){addMeetup(newMeetupName);setNewMeetupName('');}}}/>
          <button className="btn-add" onClick={()=>{if(newMeetupName.trim()){addMeetup(newMeetupName);setNewMeetupName('');}}}>+ Ajouter</button>
        </div>
      </div>

      {unassigned.length>0 && (
        <div className="card">
          <div className="card-pad" style={{paddingBottom:0}}>
            <div className="sec-label">⚠ Non assignées ({unassigned.length})</div>
          </div>
          {unassigned.map(([id,o])=>(
            <div className="unassigned-row" key={id}>
              <div className="u-info">
                <div className="u-client">{o.client}</div>
                <div className="u-addr">{o.address}</div>
              </div>
              <div style={{display:'flex',gap:6}}>
                <select className="btn-sm" style={{color:'var(--accent)'}} value=""
                  onChange={e=>{if(e.target.value)updateOrder(id,{driverId:e.target.value});}}>
                  <option value="">Assigner →</option>
                  {Object.entries(drivers).map(([did,d])=><option key={did} value={did}>{d.name}</option>)}
                </select>
                <button className="btn-sm btn-del" onClick={()=>deleteOrder(id)}>✕</button>
              </div>
            </div>
          ))}
        </div>
      )}

      {Object.entries(drivers).map(([id,d])=>(
        <AdminDriverCard key={id} driver={{...d,id}}
          route={getRoute(id)} doneOrders={getDone(id)} sp={startPos(id)}
          allDrivers={drivers} updateOrder={updateOrder} deleteOrder={deleteOrder}/>
      ))}

      {/* RESET JOURNÉE */}
      {Object.keys(orders).length > 0 && (
        <ResetButton onReset={resetAll}/>
      )}

      <div style={{height:20}}/>
    </div>
  );
}

// ── Admin Driver Card ────────────────────────────────────────
function AdminDriverCard({ driver, route, doneOrders, sp, allDrivers, updateOrder, deleteOrder }) {
  const etas  = useETAs(route, sp);
  const total = doneOrders.reduce((s,o) => s + (parseFloat(o.amount)||0), 0);

  return (
    <div className="card">
      <div className="route-hdr">
        <div className="dot" style={{background:driver.color}}/>
        <span className="route-hdr-name">{driver.name}</span>
        <span className="route-hdr-n">{route.length} à livrer{doneOrders.length>0?` · ${doneOrders.length} ✓`:''}</span>
      </div>
      {total > 0 && <div className="route-total">💰 Encaissé aujourd'hui : {fmtEuro(total)}</div>}
      {driver.stock > 0 && (
        <div style={{display:'flex',gap:0,borderBottom:'1px solid var(--border)'}}>
          <div style={{flex:1,padding:'6px 14px',background:'#061a0e',textAlign:'center',borderRight:'1px solid var(--border)'}}>
            <div style={{fontSize:9,color:'var(--muted)',fontWeight:700,letterSpacing:'1px',textTransform:'uppercase'}}>Stock départ</div>
            <div style={{fontFamily:'Space Mono,monospace',fontSize:11,fontWeight:700,color:'var(--muted)'}}>{fmtEuro(driver.stock)}</div>
          </div>
          <div style={{flex:1,padding:'6px 14px',background:'#061a0e',textAlign:'center',borderRight:'1px solid var(--border)'}}>
            <div style={{fontSize:9,color:'var(--muted)',fontWeight:700,letterSpacing:'1px',textTransform:'uppercase'}}>Encaissé</div>
            <div style={{fontFamily:'Space Mono,monospace',fontSize:11,fontWeight:700,color:'var(--ok)'}}>{fmtEuro(total)}</div>
          </div>
          <div style={{flex:1,padding:'6px 14px',background:'#061a0e',textAlign:'center'}}>
            <div style={{fontSize:9,color:'var(--muted)',fontWeight:700,letterSpacing:'1px',textTransform:'uppercase'}}>Restant</div>
            <div style={{fontFamily:'Space Mono,monospace',fontSize:11,fontWeight:700,color: (driver.stock-total)<0?'var(--crit)':'#4FC3F7'}}>{fmtEuro(Math.max(0,driver.stock-total))}</div>
          </div>
        </div>
      )}
      {route.length===0 && doneOrders.length===0 && <div className="empty-txt">Aucune commande assignée</div>}

      {route.map((o,i)=>{
        const u = urgency(o.deadline), eta = etas[i];
        return (
          <div className="order-row" key={o.id}>
            <div className="o-num">{i+1}</div>
            <div className="o-body">
              <div className="o-client">{o.client}</div>
              <div className="o-addr">{o.displayName||o.address}</div>
              <div className="o-meta">
                <span className="o-time">↓ {fmtTime(o.addedAt)}</span>
                <span className={`badge b-${u}`}>{fmtCountdown(o.deadline)} · {fmtTime(o.deadline)}</span>
                {o.driverEta
                  ? <span className="badge" style={{background:'#001830',color:'#4FC3F7'}}>⏱ {fmtTime(o.driverEta)}</span>
                  : eta ? <span className="badge b-eta">🕐 ~{fmtTime(eta)}</span> : null}
                {!o.lat && <span className="badge" style={{background:'#1a1a00',color:'#555'}}>GPS…</span>}
              </div>
            </div>
            <div className="o-actions">
              <a className="btn-sm" href={wazeUrl(o)} target="_blank" style={{color:'#4FC3F7',textDecoration:'none'}}>Waze</a>
              <button className="btn-sm" style={{color:'#C77DFF'}} onClick={()=>{
                const link = `${window.location.href.split('#')[0]}#track-${o.id}`;
                navigator.clipboard.writeText(link);
              }}>🔗 Client</button>
              <select className="btn-sm" value={driver.id}
                onChange={e=>updateOrder(o.id,{driverId:e.target.value||null})} style={{fontSize:'9px'}}>
                {Object.entries(allDrivers).map(([did,dr])=><option key={did} value={did}>{dr.name}</option>)}
                <option value="">Non assigné</option>
              </select>
              <button className="btn-sm btn-del" onClick={()=>deleteOrder(o.id)}>✕</button>
            </div>
          </div>
        );
      })}

      {doneOrders.length>0 && <>
        <div style={{padding:'6px 14px',background:'#0d0d0d',borderTop:'1px solid var(--border)',fontSize:10,color:'var(--muted)',letterSpacing:'1.5px',textTransform:'uppercase',fontWeight:700}}>
          ✓ Livrées
        </div>
        {doneOrders.map(o=>(
          <DoneOrderRow key={o.id} order={o} onUpdate={updateOrder} onDelete={deleteOrder}/>
        ))}
      </>}
    </div>
  );
}

// ── Done Order Row (admin + driver) ─────────────────────────
function DoneOrderRow({ order: o, onUpdate, onDelete, compact=false }) {
  const [editing, setEditing] = useState(false);
  const [val, setVal] = useState('');

  function startEdit() { setVal(o.amount != null ? String(o.amount) : ''); setEditing(true); }
  function save() {
    const parsed = val.trim() === '' ? null : parseFloat(val.replace(',','.'));
    onUpdate(o.id, { amount: isNaN(parsed) ? null : parsed });
    setEditing(false);
  }

  if (compact) {
    // Vue livreur — commandes déjà livrées
    return (
      <div className="dv-order done">
        <div className="dv-order-top">
          <div className="dv-n" style={{color:'var(--ok)'}}>✓</div>
          <div className="dv-body">
            <div className="dv-client">{o.client}</div>
            <div className="dv-addr">{o.displayName||o.address}</div>
            {o.note && <div style={{fontSize:11,color:'var(--muted)',marginTop:4}}>📋 {o.note}</div>}
          </div>
        </div>
        <div className="dv-order-footer">
          <span className="dv-added">Livré — {fmtTime(o.addedAt)}</span>
          <div style={{display:'flex',gap:6,alignItems:'center'}}>
            {!editing ? (
              <>
                {o.amount!=null && <span style={{fontFamily:'Space Mono,monospace',fontSize:12,color:'var(--ok)',fontWeight:700}}>{fmtEuro(o.amount)}</span>}
                <button onClick={startEdit} style={{background:'transparent',border:'1px solid #3a3a3a',color:'var(--muted)',borderRadius:5,padding:'2px 7px',fontSize:10,cursor:'pointer',fontFamily:'inherit'}}>
                  {o.amount!=null ? '✏️' : '+ montant'}
                </button>
              </>
            ) : (
              <>
                <input style={{width:70,background:'var(--s2)',border:'1px solid var(--ok)',color:'var(--text)',borderRadius:5,padding:'2px 6px',fontSize:13,fontFamily:'Space Mono,monospace',outline:'none'}}
                  type="number" inputMode="decimal" value={val} autoFocus
                  onChange={e=>setVal(e.target.value)} onKeyDown={e=>e.key==='Enter'&&save()}/>
                <span style={{color:'var(--ok)',fontSize:12}}>€</span>
                <button onClick={save} style={{background:'var(--ok)',color:'#000',border:'none',borderRadius:5,padding:'2px 8px',fontSize:11,fontWeight:800,cursor:'pointer'}}>✓</button>
                <button onClick={()=>setEditing(false)} style={{background:'transparent',border:'none',color:'var(--muted)',fontSize:11,cursor:'pointer'}}>✕</button>
              </>
            )}
            <span style={{color:'var(--ok)',fontSize:11,fontWeight:700}}>LIVRÉ</span>
          </div>
        </div>
      </div>
    );
  }

  // Vue admin
  return (
    <div className="order-row" style={{opacity:.5}}>
      <div className="o-num" style={{color:'var(--ok)'}}>✓</div>
      <div className="o-body">
        <div className="o-client">{o.client}</div>
        <div className="o-addr">{o.displayName||o.address}</div>
        {!editing ? (
          <div style={{display:'flex',alignItems:'center',gap:6,marginTop:3}}>
            {o.amount!=null && <span style={{fontSize:10,color:'var(--ok)',fontFamily:'Space Mono,monospace',fontWeight:700}}>💰 {fmtEuro(o.amount)}</span>}
            <button onClick={startEdit} style={{background:'transparent',border:'1px solid #3a3a3a',color:'var(--muted)',borderRadius:4,padding:'1px 6px',fontSize:9,cursor:'pointer',fontFamily:'Space Mono,monospace'}}>
              {o.amount!=null ? '✏️ modifier' : '+ montant'}
            </button>
            {o.amount!=null && (
              <button onClick={()=>onUpdate(o.id,{amount:null})} style={{background:'transparent',border:'1px solid #3a3a3a',color:'var(--crit)',borderRadius:4,padding:'1px 6px',fontSize:9,cursor:'pointer',fontFamily:'Space Mono,monospace'}}>✕ effacer</button>
            )}
          </div>
        ) : (
          <div style={{display:'flex',gap:5,alignItems:'center',marginTop:4}}>
            <input style={{width:80,background:'var(--s2)',border:'1px solid var(--ok)',color:'var(--text)',borderRadius:5,padding:'3px 7px',fontSize:13,fontFamily:'Space Mono,monospace',outline:'none'}}
              type="number" inputMode="decimal" value={val} autoFocus
              onChange={e=>setVal(e.target.value)} onKeyDown={e=>e.key==='Enter'&&save()}/>
            <span style={{color:'var(--ok)',fontSize:12}}>€</span>
            <button onClick={save} style={{background:'var(--ok)',color:'#000',border:'none',borderRadius:5,padding:'3px 9px',fontSize:11,fontWeight:800,cursor:'pointer'}}>✓</button>
            <button onClick={()=>setEditing(false)} style={{background:'transparent',border:'none',color:'var(--muted)',fontSize:11,cursor:'pointer'}}>✕</button>
          </div>
        )}
      </div>
      <button className="btn-sm btn-del" onClick={()=>onDelete(o.id)}>✕</button>
    </div>
  );
}

// ── Reset Button ─────────────────────────────────────────────
function ResetButton({ onReset }) {
  const [confirm, setConfirm] = useState(false);
  if (!confirm) return (
    <div style={{textAlign:'center',paddingTop:8}}>
      <button onClick={()=>setConfirm(true)} style={{
        background:'transparent', border:'1.5px solid #3a0a0a', color:'var(--crit)',
        borderRadius:10, padding:'10px 24px', fontFamily:'inherit', fontWeight:700,
        fontSize:13, cursor:'pointer'
      }}>🗑 Réinitialiser la journée</button>
    </div>
  );
  return (
    <div style={{background:'#1a0505',border:'2px solid var(--crit)',borderRadius:12,padding:16,textAlign:'center'}}>
      <div style={{fontSize:14,fontWeight:700,color:'var(--crit)',marginBottom:8}}>⚠️ Supprimer toutes les commandes du jour ?</div>
      <div style={{fontSize:12,color:'var(--muted)',marginBottom:12}}>Les chauffeurs et leurs points de départ seront conservés.</div>
      <div style={{display:'flex',gap:10,justifyContent:'center'}}>
        <button onClick={()=>{onReset();setConfirm(false);}} style={{
          background:'var(--crit)',color:'#fff',border:'none',borderRadius:8,
          padding:'9px 20px',fontWeight:800,fontSize:13,cursor:'pointer',fontFamily:'inherit'
        }}>Oui, tout supprimer</button>
        <button onClick={()=>setConfirm(false)} style={{
          background:'transparent',border:'1px solid var(--border)',color:'var(--muted)',
          borderRadius:8,padding:'9px 16px',fontSize:13,cursor:'pointer',fontFamily:'inherit'
        }}>Annuler</button>
      </div>
    </div>
  );
}

// ── Driver Base Row ──────────────────────────────────────────
function DriverBaseRow({ driver, onUpdate }) {
  const [editingAddr, setEditingAddr] = useState(false);
  const [editingStock, setEditingStock] = useState(false);
  const [addrVal, setAddrVal] = useState(driver.baseAddress||'');
  const [stockVal, setStockVal] = useState('');
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');

  async function saveAddr() {
    if (!addrVal.trim()) return;
    setLoading(true); setErr('');
    try {
      const geo = await geocodeAddress(addrVal.trim());
      await onUpdate(driver.id, {baseAddress:addrVal.trim(), baseLat:geo.lat, baseLng:geo.lng});
      setEditingAddr(false);
    } catch(e) { setErr('Adresse non trouvée'); }
    finally { setLoading(false); }
  }

  async function saveStock() {
    const v = parseFloat(stockVal.replace(',','.'));
    await onUpdate(driver.id, {stock: isNaN(v) ? null : v});
    setEditingStock(false);
  }

  return (
    <div style={{borderBottom:'1px solid var(--border)'}}>
      {/* Adresse de départ */}
      <div style={{padding:'6px 14px 6px'}}>
        {!editingAddr ? (
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:11,color:driver.baseLat?'var(--ok)':'var(--muted)'}}>
              {driver.baseLat ? `📍 ${driver.baseAddress}` : '📍 Aucun point de départ'}
            </span>
            <button className="btn-sm" onClick={()=>{setAddrVal(driver.baseAddress||'');setEditingAddr(true);}}>
              {driver.baseLat?'Modifier':'+ Définir'}
            </button>
          </div>
        ) : (
          <div style={{display:'flex',flexDirection:'column',gap:6}}>
            <div style={{display:'flex',gap:6}}>
              <input className="add-inp" style={{fontSize:13}} autoFocus
                placeholder="Adresse de départ" value={addrVal}
                onChange={e=>setAddrVal(e.target.value)}
                onKeyDown={e=>e.key==='Enter'&&saveAddr()}/>
              <button className="btn-add" onClick={saveAddr} disabled={loading||!addrVal.trim()}>{loading?'…':'✓'}</button>
              <button className="btn-sm" onClick={()=>setEditingAddr(false)}>✕</button>
            </div>
            {err && <span style={{fontSize:11,color:'var(--crit)'}}>{err}</span>}
          </div>
        )}
      </div>
      {/* Stock de départ */}
      <div style={{padding:'0 14px 8px'}}>
        {!editingStock ? (
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:11,color:driver.stock>0?'#FFD60A':'var(--muted)'}}>
              {driver.stock > 0 ? `💼 Stock : ${fmtEuro(driver.stock)}` : '💼 Aucun stock défini'}
            </span>
            <button className="btn-sm" onClick={()=>{setStockVal(driver.stock>0?String(driver.stock):'');setEditingStock(true);}}>
              {driver.stock>0?'Modifier':'+ Définir'}
            </button>
          </div>
        ) : (
          <div style={{display:'flex',gap:6,alignItems:'center'}}>
            <input className="add-inp" style={{fontSize:13,width:120}} autoFocus type="number" inputMode="decimal"
              placeholder="Ex: 5000" value={stockVal}
              onChange={e=>setStockVal(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&saveStock()}/>
            <span style={{color:'#FFD60A',fontWeight:700}}>€</span>
            <button className="btn-add" onClick={saveStock} disabled={!stockVal.trim()}>✓</button>
            <button className="btn-sm" onClick={()=>setEditingStock(false)}>✕</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Select Driver ────────────────────────────────────────────
function SelectDriver({ drivers, orders, onSelect }) {
  return (
    <div className="sel-wrap">
      <div className="sel-title">Qui es-tu ?</div>
      <div className="sel-sub">Sélectionne ton nom pour voir ta route</div>
      {Object.keys(drivers).length===0 && <div className="empty-txt">Aucun chauffeur configuré</div>}
      {Object.entries(drivers).map(([id,d])=>{
        const n = Object.values(orders).filter(o=>o.driverId===id&&o.status!=='done').length;
        return (
          <button className="driver-sel-btn" key={id} onClick={()=>onSelect(id)}>
            <div className="dot" style={{background:d.color,width:14,height:14}}/>
            <div>
              <span className="driver-sel-name">{d.name}</span>
              <span className="driver-sel-count">{n} livraison{n!==1?'s':''} en attente</span>
            </div>
          </button>
        );
      })}
    </div>
  );
}

// ══════════════════════════════════════════════════════════
// DRIVER VIEW
// ══════════════════════════════════════════════════════════
function DriverView({ driver, route, done, sp, onDone, onBack, onGpsUpdate }) {
  const { useRef } = React;
  const [time, setTime] = useState(new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}));
  const [pendingId, setPending] = useState(null);
  const [amtVal, setAmtVal]     = useState('');
  const [etaOpenId, setEtaOpen] = useState(null);
  const [etaInputVal, setEtaInputVal] = useState('');
  const [gpsActive, setGpsActive] = useState(false);
  const [gpsErr, setGpsErr]       = useState('');
  const watchId = useRef(null);
  const prevRouteLen = useRef(route.length);
  const etas = useETAs(route, sp);

  // Horloge
  useEffect(()=>{
    const t = setInterval(()=>setTime(new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})),30000);
    return ()=>clearInterval(t);
  },[]);

  // Notifications — demande permission au chargement
  useEffect(()=>{
    if ('Notification' in window && Notification.permission === 'default') {
      Notification.requestPermission();
    }
  },[]);

  // Notification quand nouvelle commande assignée
  useEffect(()=>{
    if (route.length > prevRouteLen.current) {
      const newest = route[route.length - 1];
      if (newest && Notification.permission === 'granted') {
        new Notification('🛵 Nouvelle livraison !', {
          body: `${newest.client} — ${newest.address}`,
          icon: '/favicon.ico'
        });
      }
    }
    prevRouteLen.current = route.length;
  },[route.length]);

  // GPS — activer/désactiver
  function toggleGps() {
    if (gpsActive) {
      if (watchId.current) navigator.geolocation.clearWatch(watchId.current);
      setGpsActive(false); setGpsErr('');
      onGpsUpdate(null);
    } else {
      if (!navigator.geolocation) { setGpsErr('GPS non disponible sur cet appareil'); return; }
      setGpsErr('');
      watchId.current = navigator.geolocation.watchPosition(
        pos => { onGpsUpdate({ lat: pos.coords.latitude, lng: pos.coords.longitude }); setGpsActive(true); },
        err => { setGpsErr('Localisation refusée ou indisponible'); setGpsActive(false); },
        { enableHighAccuracy: true, maximumAge: 15000 }
      );
    }
  }
  useEffect(() => () => { if (watchId.current) navigator.geolocation.clearWatch(watchId.current); }, []);

  function handleLivre(id) { setPending(id); setAmtVal(''); }
  function confirm() { onDone(pendingId, amtVal!==''?parseFloat(amtVal.replace(',','.')):null); setPending(null); }
  function skip()    { onDone(pendingId, null); setPending(null); }
  function openEta(id) { setEtaOpen(id); setEtaInputVal(''); }
  function confirmEta(id) {
    const ts = parseTimeToTs(etaInputVal);
    if (ts) { dbUpd(`orders/${id}`, {driverEta: ts}); }
    setEtaOpen(null);
  }

  const totalDone = done.reduce((s,o)=>s+(parseFloat(o.amount)||0),0);

  return (
    <div className="dv-wrap">
      <div className="dv-hdr">
        <div className="dot" style={{background:driver.color,width:12,height:12}}/>
        <span className="dv-hdr-name">{driver.name}</span>
        {onBack && <button className="dv-back" onClick={onBack}>← Changer</button>}
      </div>

      {/* BOUTON GPS */}
      <button onClick={toggleGps} style={{
        width:'100%', marginBottom:10, padding:'9px',
        background: gpsActive ? '#001830' : 'var(--s2)',
        border: `1.5px solid ${gpsActive ? '#4FC3F7' : 'var(--border)'}`,
        color: gpsActive ? '#4FC3F7' : 'var(--muted)',
        borderRadius:10, fontFamily:'inherit', fontSize:12, fontWeight:700, cursor:'pointer',
        display:'flex', alignItems:'center', justifyContent:'center', gap:8
      }}>
        {gpsActive ? '📍 GPS actif — position en direct' : '📍 Activer ma localisation GPS (optionnel)'}
      </button>
      {gpsErr && <div style={{fontSize:11,color:'var(--crit)',marginBottom:8,textAlign:'center'}}>{gpsErr}</div>}

      <div className="dv-clock">
        <div><div className="dv-clock-lbl">Heure</div><div>{time}</div></div>
        <div style={{textAlign:'right'}}><div className="dv-clock-lbl">Restantes</div><div>{route.length}</div></div>
      </div>

      {/* TABLEAU DE BORD STOCK */}
      {(driver.stock > 0 || totalDone > 0) && (
        <div style={{background:'#0a1a0e',border:'1px solid #0f3d25',borderRadius:12,padding:14,marginBottom:14}}>
          <div style={{fontSize:10,fontWeight:700,letterSpacing:'2px',textTransform:'uppercase',color:'var(--muted)',marginBottom:10}}>Bilan journée</div>
          <div style={{display:'flex',gap:8}}>
            {driver.stock > 0 && (
              <div style={{flex:1,background:'#061a0e',borderRadius:8,padding:'8px 10px',textAlign:'center'}}>
                <div style={{fontSize:9,color:'var(--muted)',fontWeight:700,letterSpacing:'1px',textTransform:'uppercase',marginBottom:3}}>Stock départ</div>
                <div style={{fontFamily:'Space Mono,monospace',fontSize:13,fontWeight:700,color:'var(--muted)'}}>{fmtEuro(driver.stock)}</div>
              </div>
            )}
            <div style={{flex:1,background:'#061a0e',borderRadius:8,padding:'8px 10px',textAlign:'center'}}>
              <div style={{fontSize:9,color:'var(--muted)',fontWeight:700,letterSpacing:'1px',textTransform:'uppercase',marginBottom:3}}>Encaissé</div>
              <div style={{fontFamily:'Space Mono,monospace',fontSize:13,fontWeight:700,color:'var(--ok)'}}>{fmtEuro(totalDone)}</div>
            </div>
            {driver.stock > 0 && (
              <div style={{flex:1,background:'#061a0e',borderRadius:8,padding:'8px 10px',textAlign:'center'}}>
                <div style={{fontSize:9,color:'var(--muted)',fontWeight:700,letterSpacing:'1px',textTransform:'uppercase',marginBottom:3}}>Restant</div>
                <div style={{fontFamily:'Space Mono,monospace',fontSize:13,fontWeight:700,color: (driver.stock - totalDone) < 0 ? 'var(--crit)' : '#4FC3F7'}}>
                  {fmtEuro(Math.max(0, driver.stock - totalDone))}
                </div>
              </div>
            )}
          </div>
        </div>
      )}

      {route.length===0&&done.length===0 && <div className="empty-txt">Aucune livraison pour le moment 👍</div>}
      {route.length===0&&done.length>0  && <div className="empty-txt" style={{color:'var(--ok)'}}>🎉 Toutes les livraisons sont terminées !</div>}

      {route.map((o,i)=>{
        const u = urgency(o.deadline), eta = etas[i], isPending = pendingId===o.id;
        return (
          <div className="dv-order" key={o.id}>
            <div className="dv-order-top">
              <div className="dv-n">{i+1}</div>
              <div className="dv-body">
                <div className="dv-client">{o.client}</div>
                <div className="dv-addr">{o.displayName||o.address}</div>
                {o.note && (
                  <div style={{background:'#1a1400',border:'1px solid #3a2e00',borderRadius:8,padding:'8px 10px',marginBottom:8,fontSize:13,color:'#FFD60A',lineHeight:'1.6',whiteSpace:'pre-wrap'}}>
                    📋 {o.note}
                  </div>
                )}
                {!isPending ? (
                  <>
                    <div className="dv-btns">
                      <a className="dv-maps" href={wazeUrl(o)} target="_blank">🚗 Waze</a>
                      <button className="dv-done" onClick={()=>handleLivre(o.id)}>✓ Livré</button>
                    </div>
                    {/* Bouton ETA Waze — saisir l'heure affichée par Waze */}
                    {etaOpenId !== o.id ? (
                      <button onClick={()=>openEta(o.id)} style={{
                        marginTop:6, background:'transparent', border:'1px solid #003a5a',
                        color:'#4FC3F7', borderRadius:7, padding:'5px 10px', fontSize:11,
                        fontFamily:'inherit', cursor:'pointer', width:'100%'
                      }}>⏱ Saisir heure d'arrivée Waze</button>
                    ) : (
                      <div style={{marginTop:6,background:'#001830',border:'1px solid #003a5a',borderRadius:8,padding:10}}>
                        <div style={{fontSize:11,color:'#4FC3F7',fontWeight:700,marginBottom:6}}>⏱ Heure Waze</div>
                        <div style={{display:'flex',gap:6}}>
                          <input
                            style={{flex:1,background:'var(--s2)',border:'1.5px solid #4FC3F7',color:'var(--text)',borderRadius:7,padding:'7px 10px',fontSize:22,fontFamily:'Space Mono,monospace',fontWeight:700,outline:'none',letterSpacing:4,textAlign:'center'}}
                            placeholder="11:30" value={etaInputVal}
                            inputMode="numeric"
                            maxLength={5}
                            onChange={e=>{
                              // Auto-format: insert colon after 2 digits
                              let raw = e.target.value.replace(/\D/g,'').slice(0,4);
                              let fmt = raw.length > 2 ? raw.slice(0,2) + ':' + raw.slice(2) : raw;
                              setEtaInputVal(fmt);
                            }}
                            onKeyDown={e=>{
                              if(e.key==='Enter' && etaInputVal.length===5) confirmEta(o.id);
                              if(e.key==='Backspace' && etaInputVal.endsWith(':')) {
                                e.preventDefault();
                                setEtaInputVal(etaInputVal.slice(0,1));
                              }
                            }}
                            autoFocus/>
                          <button onClick={()=>{ if(etaInputVal.length===5) confirmEta(o.id); }}
                            disabled={etaInputVal.length!==5}
                            style={{background: etaInputVal.length===5 ? '#4FC3F7':'#003a5a',color: etaInputVal.length===5 ?'#000':'#555',border:'none',borderRadius:7,padding:'7px 14px',fontWeight:800,cursor: etaInputVal.length===5 ?'pointer':'not-allowed',fontFamily:'inherit',fontSize:14,transition:'all .15s'}}>✓</button>
                          <button onClick={()=>setEtaOpen(null)}
                            style={{background:'transparent',border:'1px solid var(--border)',color:'var(--muted)',borderRadius:7,padding:'7px 8px',cursor:'pointer',fontFamily:'inherit'}}>✕</button>
                        </div>
                        <div style={{fontSize:10,color:'var(--muted)',marginTop:5,textAlign:'center'}}>
                          {etaInputVal.length < 5 ? `Tape ${5 - etaInputVal.length} chiffre${5-etaInputVal.length>1?'s':''} de plus` : '✓ Prêt à valider'}
                        </div>
                      </div>
                    )}
                    {o.driverEta && etaOpenId !== o.id && (
                      <div style={{marginTop:4,fontSize:11,color:'#4FC3F7',textAlign:'center'}}>
                        ⏱ Arrivée confirmée : {fmtTime(o.driverEta)}
                        <button onClick={()=>openEta(o.id)} style={{marginLeft:6,background:'transparent',border:'none',color:'var(--muted)',fontSize:10,cursor:'pointer'}}>modifier</button>
                      </div>
                    )}
                  </>
                ) : (
                  <div className="amount-box">
                    <div className="amount-box-lbl">💰 Montant encaissé ?</div>
                    <div className="amount-row">
                      <input className="amount-inp" type="number" inputMode="decimal"
                        placeholder="0.00" value={amtVal}
                        onChange={e=>setAmtVal(e.target.value)}
                        onKeyDown={e=>e.key==='Enter'&&confirm()}
                        autoFocus/>
                      <span style={{color:'var(--ok)',fontWeight:700,fontSize:16}}>€</span>
                      <button className="amount-confirm" onClick={confirm}>✓ OK</button>
                      <button className="amount-skip" onClick={skip}>Passer</button>
                    </div>
                  </div>
                )}
              </div>
            </div>
            <div className="dv-order-footer">
              <span className="dv-added">Reçu {fmtTime(o.addedAt)}</span>
              <div style={{display:'flex',gap:6,flexWrap:'wrap',justifyContent:'flex-end'}}>
                {eta && <span className="badge b-eta">🕐 ~{fmtTime(eta)}</span>}
                <span className={`badge b-${u}`}>avant {fmtTime(o.deadline)} · {fmtCountdown(o.deadline)}</span>
              </div>
            </div>
          </div>
        );
      })}

      {done.length>0 && <>
        <div style={{margin:'16px 0 8px',fontSize:10,color:'var(--muted)',letterSpacing:'2px',textTransform:'uppercase',fontWeight:700,textAlign:'center'}}>
          ✓ Déjà livrées
        </div>
        {done.map(o=>(
          <DoneOrderRow key={o.id} order={o}
            onUpdate={(id,patch)=>dbUpd(`orders/${id}`,patch)}
            onDelete={()=>{}} compact={true}/>
        ))}
      </>}
      <div style={{height:20}}/>
    </div>
  );
}

// ══════════════════════════════════════════════════════════
// CUSTOMER VIEW — page de suivi client
// ══════════════════════════════════════════════════════════
function CustomerView({ order, route, sp }) {
  const etas = useETAs(route, sp);
  const [now, setNow] = useState(Date.now());
  useEffect(() => { const t = setInterval(()=>setNow(Date.now()), 30000); return ()=>clearInterval(t); }, []);

  const pos  = route.findIndex(o => o.id === order.id);
  const calcEta = pos >= 0 ? etas[pos] : null;
  // ETA confirmée par le livreur > ETA calculée
  const eta = order.driverEta || calcEta;
  const etaIsConfirmed = !!order.driverEta;
  const isDone = order.status === 'done';

  // Texte position
  const posLabel = pos === 0 ? 'Prochaine livraison' :
                   pos === 1 ? '2ème sur la liste' :
                   pos === 2 ? '3ème sur la liste' :
                   pos > 2   ? `${pos+1}ème sur la liste` : null;

  // Temps restant avant ETA
  const etaWait = eta ? eta - now : null;
  const etaWaitTxt = etaWait != null
    ? etaWait <= 0 ? 'Imminent !'
    : etaWait < 60000 ? 'Moins d\'1 minute'
    : (() => { const h=Math.floor(etaWait/3600000), m=Math.floor((etaWait%3600000)/60000); return h>0?`${h}h${String(m).padStart(2,'0')}`:`${m} min`; })()
    : null;

  const MAX_WAIT_MS = 3.5 * 60 * 60 * 1000;
  const waitFromOrder = eta ? eta - order.addedAt : now - order.addedAt;
  const tooLong = waitFromOrder > MAX_WAIT_MS;

  return (
    <div style={{padding:20, display:'flex', flexDirection:'column', gap:16, maxWidth:400, margin:'0 auto'}}>

      {/* STATUT PRINCIPAL */}
      {isDone ? (
        <div style={{background:'#0a2a1a',border:'2px solid var(--ok)',borderRadius:16,padding:24,textAlign:'center'}}>
          <div style={{fontSize:48,marginBottom:8}}>✅</div>
          <div style={{fontSize:22,fontWeight:800,color:'var(--ok)',marginBottom:4}}>Livré !</div>
          <div style={{fontSize:13,color:'var(--muted)'}}>Votre commande a été livrée. Merci !</div>
        </div>
      ) : pos < 0 ? (
        <div style={{background:'var(--s1)',border:'1px solid var(--border)',borderRadius:16,padding:24,textAlign:'center'}}>
          <div style={{fontSize:40,marginBottom:8}}>⏳</div>
          <div style={{fontSize:18,fontWeight:800,marginBottom:4}}>En préparation</div>
          <div style={{fontSize:13,color:'var(--muted)'}}>Votre commande est en cours de traitement, elle sera assignée à un livreur très bientôt.</div>
        </div>
      ) : (
        <div style={{background:'var(--s1)',border:'2px solid var(--accent)',borderRadius:16,padding:24,textAlign:'center'}}>
          <div style={{fontSize:40,marginBottom:8}}>🛵</div>
          <div style={{fontSize:22,fontWeight:800,marginBottom:4}}>En route !</div>
          {posLabel && <div style={{display:'inline-block',background:'#2a1400',color:'var(--accent)',borderRadius:20,padding:'4px 14px',fontSize:13,fontWeight:700,marginBottom:12}}>{posLabel}</div>}

          {eta ? (
            <div style={{background:'#001830',border:`1px solid ${etaIsConfirmed?'#4FC3F7':'#003a5a'}`,borderRadius:12,padding:16,marginTop:8}}>
              <div style={{fontSize:11,color:'var(--muted)',fontWeight:700,letterSpacing:'1.5px',textTransform:'uppercase',marginBottom:4}}>
                {etaIsConfirmed ? '⏱ Arrivée confirmée par votre livreur' : 'Heure d\'arrivée estimée'}
              </div>
              <div style={{fontSize:36,fontWeight:800,color:'#4FC3F7',fontFamily:'Space Mono,monospace'}}>{fmtTime(eta)}</div>
              {etaWaitTxt && <div style={{fontSize:13,color:'var(--muted)',marginTop:4}}>dans environ <strong style={{color:'#4FC3F7'}}>{etaWaitTxt}</strong></div>}
            </div>
          ) : (
            <div style={{color:'var(--muted)',fontSize:13,marginTop:8}}>
              <span className="spin" style={{marginRight:6}}/> Calcul en cours…
            </div>
          )}

          {/* Priorité gérée automatiquement par l'algorithme */}
        </div>
      )}

      {/* INFOS COMMANDE */}
      <div style={{background:'var(--s1)',border:'1px solid var(--border)',borderRadius:14,padding:16}}>
        <div style={{fontSize:10,fontWeight:700,letterSpacing:'2px',textTransform:'uppercase',color:'var(--muted)',marginBottom:12}}>Votre commande</div>
        <div style={{fontWeight:700,fontSize:16,marginBottom:4}}>{order.client}</div>
        <div style={{fontFamily:'Space Mono,monospace',fontSize:11,color:'var(--muted)',marginBottom:8}}>{order.address}</div>
        {order.note && (
          <div style={{background:'#1a1400',border:'1px solid #3a2e00',borderRadius:8,padding:'8px 10px',fontSize:13,color:'#FFD60A',lineHeight:'1.6'}}>
            📋 {order.note}
          </div>
        )}
        <div style={{marginTop:10,paddingTop:10,borderTop:'1px solid var(--border)',fontSize:11,color:'var(--muted)'}}>
          <span>Commande reçue à {fmtTime(order.addedAt)}</span>
        </div>
      </div>

      {/* BARRE DE PROGRESSION */}
      {!isDone && pos >= 0 && (
        <div style={{background:'var(--s1)',border:'1px solid var(--border)',borderRadius:14,padding:16}}>
          <div style={{fontSize:10,fontWeight:700,letterSpacing:'2px',textTransform:'uppercase',color:'var(--muted)',marginBottom:10}}>Progression</div>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            {[...Array(Math.min(route.length,5))].map((_,i) => (
              <div key={i} style={{
                flex:1, height:6, borderRadius:3,
                background: i < pos ? 'var(--ok)' : i === pos ? 'var(--accent)' : 'var(--border)',
                transition:'background .3s'
              }}/>
            ))}
            {route.length > 5 && <span style={{fontSize:10,color:'var(--muted)'}}>+{route.length-5}</span>}
          </div>
          <div style={{display:'flex',justifyContent:'space-between',marginTop:6,fontSize:11,color:'var(--muted)'}}>
            <span>{pos} livraison{pos!==1?'s':''} avant vous</span>
            <span>{route.length - pos - 1} après</span>
          </div>
        </div>
      )}

    </div>
  );
}

// ── Meetup Stock Row ─────────────────────────────────────────
function MeetupStockRow({ meetup, onUpdate }) {
  const [editing, setEditing] = useState(false);
  const [val, setVal] = useState('');
  async function save() {
    const v = parseFloat(val.replace(',','.'));
    await onUpdate(meetup.id, {stock: isNaN(v)?null:v});
    setEditing(false);
  }
  return (
    <div style={{padding:'0 14px 8px',borderBottom:'1px solid var(--border)'}}>
      {!editing ? (
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:11,color:meetup.stock>0?'#FFD60A':'var(--muted)'}}>
            {meetup.stock>0?`💼 Stock : ${fmtEuro(meetup.stock)}`:'💼 Aucun stock défini'}
          </span>
          <button className="btn-sm" onClick={()=>{setVal(meetup.stock>0?String(meetup.stock):'');setEditing(true);}}>
            {meetup.stock>0?'Modifier':'+ Définir'}
          </button>
        </div>
      ) : (
        <div style={{display:'flex',gap:6,alignItems:'center'}}>
          <input className="add-inp" style={{fontSize:13,width:120}} autoFocus type="number" inputMode="decimal"
            placeholder="Ex: 5000" value={val}
            onChange={e=>setVal(e.target.value)} onKeyDown={e=>e.key==='Enter'&&save()}/>
          <span style={{color:'#FFD60A',fontWeight:700}}>€</span>
          <button className="btn-add" onClick={save} disabled={!val.trim()}>✓</button>
          <button className="btn-sm" onClick={()=>setEditing(false)}>✕</button>
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════
// MEETUP VIEW — vue de la personne sur place
// ══════════════════════════════════════════════════════════
function MeetupView({ meetup, pending, done, onDone, onBack }) {
  const [time, setTime] = useState(new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}));
  const [pendingId, setPending] = useState(null);
  const [amtVal, setAmtVal] = useState('');
  const prevArrivedCount = React.useRef(pending.filter(o=>o.status==='arrived').length);

  useEffect(()=>{
    const t = setInterval(()=>setTime(new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})),30000);
    return ()=>clearInterval(t);
  },[]);

  // Notification quand nouveau client marqué "arrivé" par l'admin
  useEffect(()=>{
    if('Notification' in window && Notification.permission==='default') Notification.requestPermission();
  },[]);
  useEffect(()=>{
    const arrivedNow = pending.filter(o=>o.status==='arrived').length;
    if(arrivedNow > prevArrivedCount.current) {
      const newest = pending.filter(o=>o.status==='arrived').pop();
      if(newest && Notification.permission==='granted') {
        new Notification('📍 Client sur place !', {body:`${newest.client} est arrivé`});
      }
    }
    prevArrivedCount.current = arrivedNow;
  },[pending]);

  function handleDone(id) { setPending(id); setAmtVal(''); }
  function confirm() { onDone(pendingId, amtVal!==''?parseFloat(amtVal.replace(',','.')):null); setPending(null); }
  function skip() { onDone(pendingId, null); setPending(null); }

  const totalDone = done.reduce((s,o)=>s+(parseFloat(o.amount)||0),0);
  const waiting   = pending.filter(o=>o.status!=='arrived');
  const arrived   = pending.filter(o=>o.status==='arrived');

  return (
    <div className="dv-wrap">
      <div className="dv-hdr">
        <div className="dot" style={{background:meetup.color,width:12,height:12}}/>
        <span className="dv-hdr-name">📍 {meetup.name}</span>
        {onBack && <button className="dv-back" onClick={onBack}>← Retour</button>}
      </div>

      <div className="dv-clock">
        <div><div className="dv-clock-lbl">Heure</div><div>{time}</div></div>
        <div style={{textAlign:'right'}}><div className="dv-clock-lbl">En attente</div><div>{waiting.length}</div></div>
      </div>

      {/* BILAN STOCK */}
      {(meetup.stock>0||totalDone>0) && (
        <div style={{background:'#0a1a0e',border:'1px solid #0f3d25',borderRadius:12,padding:14,marginBottom:14}}>
          <div style={{fontSize:10,fontWeight:700,letterSpacing:'2px',textTransform:'uppercase',color:'var(--muted)',marginBottom:10}}>Bilan journée</div>
          <div style={{display:'flex',gap:8}}>
            {meetup.stock>0 && (
              <div style={{flex:1,background:'#061a0e',borderRadius:8,padding:'8px 10px',textAlign:'center'}}>
                <div style={{fontSize:9,color:'var(--muted)',fontWeight:700,letterSpacing:'1px',textTransform:'uppercase',marginBottom:3}}>Stock départ</div>
                <div style={{fontFamily:'Space Mono,monospace',fontSize:13,fontWeight:700,color:'var(--muted)'}}>{fmtEuro(meetup.stock)}</div>
              </div>
            )}
            <div style={{flex:1,background:'#061a0e',borderRadius:8,padding:'8px 10px',textAlign:'center'}}>
              <div style={{fontSize:9,color:'var(--muted)',fontWeight:700,letterSpacing:'1px',textTransform:'uppercase',marginBottom:3}}>Encaissé</div>
              <div style={{fontFamily:'Space Mono,monospace',fontSize:13,fontWeight:700,color:'var(--ok)'}}>{fmtEuro(totalDone)}</div>
            </div>
            {meetup.stock>0 && (
              <div style={{flex:1,background:'#061a0e',borderRadius:8,padding:'8px 10px',textAlign:'center'}}>
                <div style={{fontSize:9,color:'var(--muted)',fontWeight:700,letterSpacing:'1px',textTransform:'uppercase',marginBottom:3}}>Restant</div>
                <div style={{fontFamily:'Space Mono,monospace',fontSize:13,fontWeight:700,color:'#4FC3F7'}}>{fmtEuro(Math.max(0,meetup.stock-totalDone))}</div>
              </div>
            )}
          </div>
        </div>
      )}

      {pending.length===0&&done.length===0 && <div className="empty-txt">Aucun client pour le moment 👍</div>}
      {pending.length===0&&done.length>0 && <div className="empty-txt" style={{color:'var(--ok)'}}>🎉 Tous les clients ont été servis !</div>}

      {/* CLIENTS ARRIVÉS — à traiter en priorité */}
      {arrived.map(o=>{
        const isPending = pendingId===o.id;
        return (
          <div className="dv-order" key={o.id} style={{border:'2px solid #4FC3F7'}}>
            <div style={{background:'#001830',padding:'5px 13px',fontSize:11,color:'#4FC3F7',fontWeight:700}}>
              📍 CLIENT SUR PLACE
            </div>
            <div className="dv-order-top">
              <div className="dv-n" style={{color:'#4FC3F7'}}>!</div>
              <div className="dv-body">
                <div className="dv-client">{o.client}</div>
                {o.note && <div style={{background:'#1a1400',border:'1px solid #3a2e00',borderRadius:8,padding:'8px 10px',marginBottom:8,fontSize:13,color:'#FFD60A',lineHeight:'1.6',whiteSpace:'pre-wrap'}}>📋 {o.note}</div>}
                {!isPending ? (
                  <button className="dv-done" style={{width:'100%'}} onClick={()=>handleDone(o.id)}>✓ Client servi</button>
                ) : (
                  <div className="amount-box">
                    <div className="amount-box-lbl">💰 Montant encaissé ?</div>
                    <div className="amount-row">
                      <input className="amount-inp" type="number" inputMode="decimal" placeholder="0.00" value={amtVal}
                        onChange={e=>setAmtVal(e.target.value)} onKeyDown={e=>e.key==='Enter'&&confirm()} autoFocus/>
                      <span style={{color:'var(--ok)',fontWeight:700,fontSize:16}}>€</span>
                      <button className="amount-confirm" onClick={confirm}>✓ OK</button>
                      <button className="amount-skip" onClick={skip}>Passer</button>
                    </div>
                  </div>
                )}
              </div>
            </div>
            <div className="dv-order-footer">
              <span className="dv-added">Reçu {fmtTime(o.addedAt)}</span>
              <span className={`badge b-${urgency(o.deadline)}`}>{fmtCountdown(o.deadline)}</span>
            </div>
          </div>
        );
      })}

      {/* CLIENTS EN ATTENTE */}
      {waiting.length>0 && (
        <>
          {arrived.length>0 && <div style={{margin:'12px 0 6px',fontSize:10,color:'var(--muted)',letterSpacing:'2px',textTransform:'uppercase',fontWeight:700,textAlign:'center'}}>En attente</div>}
          {waiting.map((o,i)=>(
            <div className="dv-order" key={o.id}>
              <div className="dv-order-top">
                <div className="dv-n">{i+1}</div>
                <div className="dv-body">
                  <div className="dv-client">{o.client}</div>
                  {o.note && <div style={{background:'#1a1400',border:'1px solid #3a2e00',borderRadius:8,padding:'8px 10px',fontSize:13,color:'#FFD60A',lineHeight:'1.6',whiteSpace:'pre-wrap'}}>📋 {o.note}</div>}
                </div>
              </div>
              <div className="dv-order-footer">
                <span className="dv-added">Reçu {fmtTime(o.addedAt)}</span>
                <span className={`badge b-${urgency(o.deadline)}`}>{fmtCountdown(o.deadline)}</span>
              </div>
            </div>
          ))}
        </>
      )}

      {/* CLIENTS SERVIS */}
      {done.length>0 && <>
        <div style={{margin:'16px 0 8px',fontSize:10,color:'var(--muted)',letterSpacing:'2px',textTransform:'uppercase',fontWeight:700,textAlign:'center'}}>✓ Déjà servis</div>
        {done.map(o=>(
          <div className="dv-order done" key={o.id}>
            <div className="dv-order-top">
              <div className="dv-n" style={{color:'var(--ok)'}}>✓</div>
              <div className="dv-body">
                <div className="dv-client">{o.client}</div>
                {o.note && <div style={{fontSize:11,color:'var(--muted)',marginTop:4}}>📋 {o.note}</div>}
              </div>
            </div>
            <div className="dv-order-footer">
              <span className="dv-added">Servi — {fmtTime(o.addedAt)}</span>
              {o.amount!=null && <span style={{fontFamily:'Space Mono,monospace',fontSize:12,color:'var(--ok)',fontWeight:700}}>{fmtEuro(o.amount)}</span>}
            </div>
          </div>
        ))}
      </>}
      <div style={{height:20}}/>
    </div>
  );
}

// ══════════════════════════════════════════════════════════
// HISTORY VIEW
// ══════════════════════════════════════════════════════════
function HistoryView() {
  const [history, setHistory] = useState({});
  useEffect(() => { dbOn('history', v => setHistory(v || {})); }, []);

  const entries = Object.entries(history).sort((a,b) => (b[1].savedAt||0) - (a[1].savedAt||0));

  return (
    <div className="content">
      <div style={{fontSize:10,fontWeight:700,letterSpacing:'2.5px',textTransform:'uppercase',color:'var(--muted)',padding:'4px 0 8px'}}>
        Historique des journées
      </div>
      {entries.length === 0 && <div className="empty-txt">Aucun historique — il apparaîtra après le premier reset journée</div>}
      {entries.map(([id, snap]) => {
        const orders = snap.orders || [];
        const done   = orders.filter(o => o.status === 'done');
        const total  = done.reduce((s,o) => s + (parseFloat(o.amount)||0), 0);
        return (
          <div className="card" key={id}>
            <div className="route-hdr">
              <span className="route-hdr-name">📅 {snap.date}</span>
              <span className="route-hdr-n">{done.length}/{orders.length} livrées</span>
            </div>
            {total > 0 && <div className="route-total">💰 Total encaissé : {fmtEuro(total)}</div>}
            {done.map((o,i) => (
              <div className="order-row" key={i} style={{opacity:.7}}>
                <div className="o-num" style={{color:'var(--ok)'}}>✓</div>
                <div className="o-body">
                  <div className="o-client">{o.client}</div>
                  <div className="o-addr">{o.address}</div>
                  {o.amount!=null && <div style={{fontSize:10,color:'var(--ok)',marginTop:2}}>💰 {fmtEuro(o.amount)}</div>}
                </div>
              </div>
            ))}
          </div>
        );
      })}
      <div style={{height:20}}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body>
