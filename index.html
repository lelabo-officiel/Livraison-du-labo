// DRIVER VIEW
// ══════════════════════════════════════════════════════════
function DriverView({ driver, pending, done, depot, onDone, onBack }) {
  const { ordered: route, totalDurationSec, osrmFailed, loading } = useOptimizedRoute(pending, depot);
  const etas = useETAs(route, depot);
  const [time, setTime] = useState(new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}));
  const [pendingId, setPending] = useState(null);
  const [amtVal, setAmtVal]     = useState('');
  const [etaOpenId, setEtaOpen] = useState(null);
  const [etaInputVal, setEtaInputVal] = useState('');
  const prevRouteLen = useRef(route.length);

  useEffect(()=>{
    const t = setInterval(()=>setTime(new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})),30000);
    return ()=>clearInterval(t);
  },[]);

  useEffect(()=>{
    if ('Notification' in window && Notification.permission === 'default') {
      Notification.requestPermission();
    }
  },[]);

  useEffect(()=>{
    if (route.length > prevRouteLen.current) {
      const newest = route[route.length - 1];
      if (newest && Notification.permission === 'granted') {
        new Notification('🛵 Nouvelle livraison !', {
          body: `${newest.client} — ${newest.address}`,
          icon: '/favicon.ico'
        });
      }
    }
    prevRouteLen.current = route.length;
  },[route.length]);

  function handleLivre(id) { setPending(id); setAmtVal(''); }
  function confirm() { onDone(pendingId, amtVal!==''?parseFloat(amtVal.replace(',','.')):null); setPending(null); }
  function skip()    { onDone(pendingId, null); setPending(null); }
  function openEta(id) { setEtaOpen(id); setEtaInputVal(''); }
  function confirmEta(id) {
    const ts = parseTimeToTs(etaInputVal);
    if (ts) { dbUpd(`orders/${id}`, {driverEta: ts}); }
    setEtaOpen(null);
  }

  const totalDone = done.reduce((s,o)=>s+(parseFloat(o.amount)||0),0);

  return (
    <div className="dv-wrap">
      <div className="dv-hdr">
        <div className="dot" style={{background:driver.color,width:12,height:12}}/>
        <span className="dv-hdr-name">{driver.name}</span>
        {onBack && <button className="dv-back" onClick={onBack}>← Changer</button>}
      </div>

      {loading && (
        <div style={{background:'#001830',border:'1px solid #4FC3F7',color:'#4FC3F7',borderRadius:10,padding:'10px 14px',marginBottom:10,textAlign:'center',fontSize:12,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
          <span className="spin"/> Calcul de ta tournée optimale…
        </div>
      )}
      {osrmFailed && !loading && (
        <div style={{background:'#2a0b12',border:'1px solid var(--crit)',color:'var(--crit)',borderRadius:10,padding:'10px 14px',marginBottom:10,textAlign:'center',fontSize:12,fontWeight:700}}>
          ⚠ OSRM indisponible — ordre estimé (à vol d'oiseau). Vérifie l'ordre avant de partir.
        </div>
      )}

      <div className="dv-clock">
        <div><div className="dv-clock-lbl">Heure</div><div>{time}</div></div>
        <div style={{textAlign:'right'}}><div className="dv-clock-lbl">Restantes</div><div>{route.length}</div></div>
      </div>

      {!loading && route.length > 1 && (
        <div style={{background:'#001830',border:'1px solid #003a5a',borderRadius:10,padding:'8px 14px',marginBottom:10,textAlign:'center',fontSize:12,color:'#4FC3F7',fontWeight:700}}>
          🕐 Tournée totale : ~{fmtDuration(totalDurationSec)} (retour dépôt inclus)
        </div>
      )}

      {(driver.stock > 0 || totalDone > 0) && (
        <div style={{background:'#0a1a0e',border:'1px solid #0f3d25',borderRadius:12,padding:14,marginBottom:14}}>
          <div style={{fontSize:10,fontWeight:700,letterSpacing:'2px',textTransform:'uppercase',color:'var(--muted)',marginBottom:10}}>Bilan journée</div>
          <div style={{display:'flex',gap:8}}>
            {driver.stock > 0 && (
              <div style={{flex:1,background:'#061a0e',borderRadius:8,padding:'8px 10px',textAlign:'center'}}>
                <div style={{fontSize:9,color:'var(--muted)',fontWeight:700,letterSpacing:'1px',textTransform:'uppercase',marginBottom:3}}>Stock départ</div>
                <div style={{fontFamily:'Space Mono,monospace',fontSize:13,fontWeight:700,color:'var(--muted)'}}>{fmtEuro(driver.stock)}</div>
              </div>
            )}
            <div style={{flex:1,background:'#061a0e',borderRadius:8,padding:'8px 10px',textAlign:'center'}}>
              <div style={{fontSize:9,color:'var(--muted)',fontWeight:700,letterSpacing:'1px',textTransform:'uppercase',marginBottom:3}}>Encaissé</div>
              <div style={{fontFamily:'Space Mono,monospace',fontSize:13,fontWeight:700,color:'var(--ok)'}}>{fmtEuro(totalDone)}</div>
            </div>
            {driver.stock > 0 && (
              <div style={{flex:1,background:'#061a0e',borderRadius:8,padding:'8px 10px',textAlign:'center'}}>
                <div style={{fontSize:9,color:'var(--muted)',fontWeight:700,letterSpacing:'1px',textTransform:'uppercase',marginBottom:3}}>Restant</div>
                <div style={{fontFamily:'Space Mono,monospace',fontSize:13,fontWeight:700,color: (driver.stock - totalDone) < 0 ? 'var(--crit)' : '#4FC3F7'}}>
                  {fmtEuro(Math.max(0, driver.stock - totalDone))}
                </div>
              </div>
            )}
          </div>
        </div>
      )}

      {route.length===0&&done.length===0 && <div className="empty-txt">Aucune livraison pour le moment 👍</div>}
      {route.length===0&&done.length>0  && <div className="empty-txt" style={{color:'var(--ok)'}}>🎉 Toutes les livraisons sont terminées !</div>}

      {route.map((o,i)=>{
        const u = urgency(o.deadline), eta = etas[i], isPending = pendingId===o.id;
        return (
          <div className="dv-order" key={o.id}>
            <div className="dv-order-top">
              <div className="dv-n">{i+1}</div>
              <div className="dv-body">
                <div className="dv-client">{o.client}</div>
                <div className="dv-addr">{o.displayName||o.address}</div>
                {o.note && (
                  <div style={{background:'#1a1400',border:'1px solid #3a2e00',borderRadius:8,padding:'8px 10px',marginBottom:8,fontSize:13,color:'#FFD60A',lineHeight:'1.6',whiteSpace:'pre-wrap'}}>
                    📋 {o.note}
                  </div>
                )}
                {!isPending ? (
                  <>
                    <div className="dv-btns">
                      <a className="dv-maps" href={wazeUrl(o)} target="_blank">🚗 Waze</a>
                      <button className="dv-done" onClick={()=>handleLivre(o.id)}>✓ Livré</button>
                    </div>
                    {etaOpenId !== o.id ? (
                      <button onClick={()=>openEta(o.id)} style={{
                        marginTop:6, background:'transparent', border:'1px solid #003a5a',
                        color:'#4FC3F7', borderRadius:7, padding:'5px 10px', fontSize:11,
                        fontFamily:'inherit', cursor:'pointer', width:'100%'
                      }}>⏱ Saisir heure d'arrivée Waze</button>
                    ) : (
                      <div style={{marginTop:6,background:'#001830',border:'1px solid #003a5a',borderRadius:8,padding:10}}>
                        <div style={{fontSize:11,color:'#4FC3F7',fontWeight:700,marginBottom:6}}>⏱ Heure Waze</div>
                        <div style={{display:'flex',gap:6}}>
                          <input
                            style={{flex:1,background:'var(--s2)',border:'1.5px solid #4FC3F7',color:'var(--text)',borderRadius:7,padding:'7px 10px',fontSize:22,fontFamily:'Space Mono,monospace',fontWeight:700,outline:'none',letterSpacing:4,textAlign:'center'}}
                            placeholder="11:30" value={etaInputVal}
                            inputMode="numeric"
                            maxLength={5}
                            onChange={e=>{
                              let raw = e.target.value.replace(/\D/g,'').slice(0,4);
                              let fmt = raw.length > 2 ? raw.slice(0,2) + ':' + raw.slice(2) : raw;
                              setEtaInputVal(fmt);
                            }}
                            onKeyDown={e=>{
                              if(e.key==='Enter' && etaInputVal.length===5) confirmEta(o.id);
                              if(e.key==='Backspace' && etaInputVal.endsWith(':')) {
                                e.preventDefault();
                                setEtaInputVal(etaInputVal.slice(0,1));
                              }
                            }}
                            autoFocus/>
                          <button onClick={()=>{ if(etaInputVal.length===5) confirmEta(o.id); }}
                            disabled={etaInputVal.length!==5}
                            style={{background: etaInputVal.length===5 ? '#4FC3F7':'#003a5a',color: etaInputVal.length===5 ?'#000':'#555',border:'none',borderRadius:7,padding:'7px 14px',fontWeight:800,cursor: etaInputVal.length===5 ?'pointer':'not-allowed',fontFamily:'inherit',fontSize:14,transition:'all .15s'}}>✓</button>
                          <button onClick={()=>setEtaOpen(null)}
                            style={{background:'transparent',border:'1px solid var(--border)',color:'var(--muted)',borderRadius:7,padding:'7px 8px',cursor:'pointer',fontFamily:'inherit'}}>✕</button>
                        </div>
                        <div style={{fontSize:10,color:'var(--muted)',marginTop:5,textAlign:'center'}}>
                          {etaInputVal.length < 5 ? `Tape ${5 - etaInputVal.length} chiffre${5-etaInputVal.length>1?'s':''} de plus` : '✓ Prêt à valider'}
                        </div>
                      </div>
                    )}
                    {o.driverEta && etaOpenId !== o.id && (
                      <div style={{marginTop:4,fontSize:11,color:'#4FC3F7',textAlign:'center'}}>
                        ⏱ Arrivée confirmée : {fmtTime(o.driverEta)}
                        <button onClick={()=>openEta(o.id)} style={{marginLeft:6,background:'transparent',border:'none',color:'var(--muted)',fontSize:10,cursor:'pointer'}}>modifier</button>
                      </div>
                    )}
                  </>
                ) : (
                  <div className="amount-box">
                    <div className="amount-box-lbl">💰 Montant encaissé ?</div>
                    <div className="amount-row">
                      <input className="amount-inp" type="number" inputMode="decimal"
                        placeholder="0.00" value={amtVal}
                        onChange={e=>setAmtVal(e.target.value)}
                        onKeyDown={e=>e.key==='Enter'&&confirm()}
                        autoFocus/>
                      <span style={{color:'var(--ok)',fontWeight:700,fontSize:16}}>€</span>
                      <button className="amount-confirm" onClick={confirm}>✓ OK</button>
                      <button className="amount-skip" onClick={skip}>Passer</button>
                    </div>
                  </div>
                )}
              </div>
            </div>
            <div className="dv-order-footer">
              <span className="dv-added">Reçu {fmtTime(o.addedAt)}</span>
              <div style={{display:'flex',gap:6,flexWrap:'wrap',justifyContent:'flex-end'}}>
                {eta && <span className="badge b-eta">🕐 ~{fmtTime(eta)}</span>}
                <span className={`badge b-${u}`}>avant {fmtTime(o.deadline)} · {fmtCountdown(o.deadline)}</span>
              </div>
            </div>
          </div>
        );
      })}

      {done.length>0 && <>
        <div style={{margin:'16px 0 8px',fontSize:10,color:'var(--muted)',letterSpacing:'2px',textTransform:'uppercase',fontWeight:700,textAlign:'center'}}>
          ✓ Déjà livrées
        </div>
        {done.map(o=>(
          <DoneOrderRow key={o.id} order={o}
            onUpdate={(id,patch)=>dbUpd(`orders/${id}`,patch)}
            onDelete={()=>{}} compact={true}/>
        ))}
      </>}
      <div style={{height:20}}/>
    </div>
  );
}

// ══════════════════════════════════════════════════════════
// CUSTOMER VIEW
// ══════════════════════════════════════════════════════════
function CustomerView({ order, pendingForDriver, depot }) {
  const { ordered: route } = useOptimizedRoute(pendingForDriver, depot);
  const etas = useETAs(route, depot);
  const [now, setNow] = useState(Date.now());
  useEffect(() => { const t = setInterval(()=>setNow(Date.now()), 30000); return ()=>clearInterval(t); }, []);

  const pos  = route.findIndex(o => o.id === order.id);
  const calcEta = pos >= 0 ? etas[pos] : null;
  const eta = order.driverEta || calcEta;
  const etaIsConfirmed = !!order.driverEta;
  const isDone = order.status === 'done';

  const posLabel = pos === 0 ? 'Prochaine livraison' :
                   pos === 1 ? '2ème sur la liste' :
                   pos === 2 ? '3ème sur la liste' :
                   pos > 2   ? `${pos+1}ème sur la liste` : null;

  const etaWait = eta ? eta - now : null;
  const etaWaitTxt = etaWait != null
    ? etaWait <= 0 ? 'Imminent !'
    : etaWait < 60000 ? 'Moins d\'1 minute'
    : (() => { const h=Math.floor(etaWait/3600000), m=Math.floor((etaWait%3600000)/60000); return h>0?`${h}h${String(m).padStart(2,'0')}`:`${m} min`; })()
    : null;

  return (
    <div style={{padding:20, display:'flex', flexDirection:'column', gap:16, maxWidth:400, margin:'0 auto'}}>
      {isDone ? (
        <div style={{background:'#0a2a1a',border:'2px solid var(--ok)',borderRadius:16,padding:24,textAlign:'center'}}>
          <div style={{fontSize:48,marginBottom:8}}>✅</div>
          <div style={{fontSize:22,fontWeight:800,color:'var(--ok)',marginBottom:4}}>Livré !</div>
          <div style={{fontSize:13,color:'var(--muted)'}}>Votre commande a été livrée. Merci !</div>
        </div>
      ) : pos < 0 ? (
        <div style={{background:'var(--s1)',border:'1px solid var(--border)',borderRadius:16,padding:24,textAlign:'center'}}>
          <div style={{fontSize:40,marginBottom:8}}>⏳</div>
          <div style={{fontSize:18,fontWeight:800,marginBottom:4}}>En préparation</div>
          <div style={{fontSize:13,color:'var(--muted)'}}>Votre commande est en cours de traitement, elle sera assignée à un livreur très bientôt.</div>
        </div>
      ) : (
        <div style={{background:'var(--s1)',border:'2px solid var(--accent)',borderRadius:16,padding:24,textAlign:'center'}}>
          <div style={{fontSize:40,marginBottom:8}}>🛵</div>
          <div style={{fontSize:22,fontWeight:800,marginBottom:4}}>En route !</div>
          {posLabel && <div style={{display:'inline-block',background:'#2a1400',color:'var(--accent)',borderRadius:20,padding:'4px 14px',fontSize:13,fontWeight:700,marginBottom:12}}>{posLabel}</div>}
          {eta ? (
            <div style={{background:'#001830',border:`1px solid ${etaIsConfirmed?'#4FC3F7':'#003a5a'}`,borderRadius:12,padding:16,marginTop:8}}>
              <div style={{fontSize:11,color:'var(--muted)',fontWeight:700,letterSpacing:'1.5px',textTransform:'uppercase',marginBottom:4}}>
                {etaIsConfirmed ? '⏱ Arrivée confirmée par votre livreur' : 'Heure d\'arrivée estimée'}
              </div>
              <div style={{fontSize:36,fontWeight:800,color:'#4FC3F7',fontFamily:'Space Mono,monospace'}}>{fmtTime(eta)}</div>
              {etaWaitTxt && <div style={{fontSize:13,color:'var(--muted)',marginTop:4}}>dans environ <strong style={{color:'#4FC3F7'}}>{etaWaitTxt}</strong></div>}
            </div>
          ) : (
            <div style={{color:'var(--muted)',fontSize:13,marginTop:8}}>
              <span className="spin" style={{marginRight:6}}/> Calcul en cours…
            </div>
          )}
        </div>
      )}

      <div style={{background:'var(--s1)',border:'1px solid var(--border)',borderRadius:14,padding:16}}>
        <div style={{fontSize:10,fontWeight:700,letterSpacing:'2px',textTransform:'uppercase',color:'var(--muted)',marginBottom:12}}>Votre commande</div>
        <div style={{fontWeight:700,fontSize:16,marginBottom:4}}>{order.client}</div>
        <div style={{fontFamily:'Space Mono,monospace',fontSize:11,color:'var(--muted)',marginBottom:8}}>{order.address}</div>
        {order.note && (
          <div style={{background:'#1a1400',border:'1px solid #3a2e00',borderRadius:8,padding:'8px 10px',fontSize:13,color:'#FFD60A',lineHeight:'1.6'}}>
            📋 {order.note}
          </div>
        )}
        <div style={{marginTop:10,paddingTop:10,borderTop:'1px solid var(--border)',fontSize:11,color:'var(--muted)'}}>
          <span>Commande reçue à {fmtTime(order.addedAt)}</span>
        </div>
      </div>

      {!isDone && pos >= 0 && (
        <div style={{background:'var(--s1)',border:'1px solid var(--border)',borderRadius:14,padding:16}}>
          <div style={{fontSize:10,fontWeight:700,letterSpacing:'2px',textTransform:'uppercase',color:'var(--muted)',marginBottom:10}}>Progression</div>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            {[...Array(Math.min(route.length,5))].map((_,i) => (
              <div key={i} style={{
                flex:1, height:6, borderRadius:3,
                background: i < pos ? 'var(--ok)' : i === pos ? 'var(--accent)' : 'var(--border)',
                transition:'background .3s'
              }}/>
            ))}
            {route.length > 5 && <span style={{fontSize:10,color:'var(--muted)'}}>+{route.length-5}</span>}
          </div>
          <div style={{display:'flex',justifyContent:'space-between',marginTop:6,fontSize:11,color:'var(--muted)'}}>
            <span>{pos} livraison{pos!==1?'s':''} avant vous</span>
            <span>{route.length - pos - 1} après</span>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Meetup Stock Row ─────────────────────────────────────────
function MeetupStockRow({ meetup, onUpdate }) {
  const [editing, setEditing] = useState(false);
  const [val, setVal] = useState('');
  async function save() {
    const v = parseFloat(val.replace(',','.'));
    await onUpdate(meetup.id, {stock: isNaN(v)?null:v});
    setEditing(false);
  }
  return (
    <div style={{padding:'0 14px 8px',borderBottom:'1px solid var(--border)'}}>
      {!editing ? (
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:11,color:meetup.stock>0?'#FFD60A':'var(--muted)'}}>
            {meetup.stock>0?`💼 Stock : ${fmtEuro(meetup.stock)}`:'💼 Aucun stock défini'}
          </span>
          <button className="btn-sm" onClick={()=>{setVal(meetup.stock>0?String(meetup.stock):'');setEditing(true);}}>
            {meetup.stock>0?'Modifier':'+ Définir'}
          </button>
        </div>
      ) : (
        <div style={{display:'flex',gap:6,alignItems:'center'}}>
          <input className="add-inp" style={{fontSize:13,width:120}} autoFocus type="number" inputMode="decimal"
            placeholder="Ex: 5000" value={val}
            onChange={e=>setVal(e.target.value)} onKeyDown={e=>e.key==='Enter'&&save()}/>
          <span style={{color:'#FFD60A',fontWeight:700}}>€</span>
          <button className="btn-add" onClick={save} disabled={!val.trim()}>✓</button>
          <button className="btn-sm" onClick={()=>setEditing(false)}>✕</button>
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════
// MEETUP VIEW
// ══════════════════════════════════════════════════════════
function MeetupView({ meetup, pending, done, onDone, onBack }) {
  const [time, setTime] = useState(new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}));
  const [pendingId, setPending] = useState(null);
  const [amtVal, setAmtVal] = useState('');
  const prevArrivedCount = useRef(pending.filter(o=>o.status==='arrived').length);

  useEffect(()=>{
    const t = setInterval(()=>setTime(new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})),30000);
    return ()=>clearInterval(t);
  },[]);

  useEffect(()=>{
    if('Notification' in window && Notification.permission==='default') Notification.requestPermission();
  },[]);
  useEffect(()=>{
    const arrivedNow = pending.filter(o=>o.status==='arrived').length;
    if(arrivedNow > prevArrivedCount.current) {
      const newest = pending.filter(o=>o.status==='arrived').pop();
      if(newest && Notification.permission==='granted') {
        new Notification('📍 Client sur place !', {body:`${newest.client} est arrivé`});
      }
    }
    prevArrivedCount.current = arrivedNow;
  },[pending]);

  function handleDone(id) { setPending(id); setAmtVal(''); }
  function confirm() { onDone(pendingId, amtVal!==''?parseFloat(amtVal.replace(',','.')):null); setPending(null); }
  function skip() { onDone(pendingId, null); setPending(null); }

  const totalDone = done.reduce((s,o)=>s+(parseFloat(o.amount)||0),0);
  const waiting   = pending.filter(o=>o.status!=='arrived');
  const arrived   = pending.filter(o=>o.status==='arrived');

  return (
    <div className="dv-wrap">
      <div className="dv-hdr">
        <div className="dot" style={{background:meetup.color,width:12,height:12}}/>
        <span className="dv-hdr-name">📍 {meetup.name}</span>
        {onBack && <button className="dv-back" onClick={onBack}>← Retour</button>}
      </div>

      <div className="dv-clock">
        <div><div className="dv-clock-lbl">Heure</div><div>{time}</div></div>
        <div style={{textAlign:'right'}}><div className="dv-clock-lbl">En attente</div><div>{waiting.length}</div></div>
      </div>

      {(meetup.stock>0||totalDone>0) && (
        <div style={{background:'#0a1a0e',border:'1px solid #0f3d25',borderRadius:12,padding:14,marginBottom:14}}>
          <div style={{fontSize:10,fontWeight:700,letterSpacing:'2px',textTransform:'uppercase',color:'var(--muted)',marginBottom:10}}>Bilan journée</div>
          <div style={{display:'flex',gap:8}}>
            {meetup.stock>0 && (
              <div style={{flex:1,background:'#061a0e',borderRadius:8,padding:'8px 10px',textAlign:'center'}}>
                <div style={{fontSize:9,color:'var(--muted)',fontWeight:700,letterSpacing:'1px',textTransform:'uppercase',marginBottom:3}}>Stock départ</div>
                <div style={{fontFamily:'Space Mono,monospace',fontSize:13,fontWeight:700,color:'var(--muted)'}}>{fmtEuro(meetup.stock)}</div>
              </div>
            )}
            <div style={{flex:1,background:'#061a0e',borderRadius:8,padding:'8px 10px',textAlign:'center'}}>
              <div style={{fontSize:9,color:'var(--muted)',fontWeight:700,letterSpacing:'1px',textTransform:'uppercase',marginBottom:3}}>Encaissé</div>
              <div style={{fontFamily:'Space Mono,monospace',fontSize:13,fontWeight:700,color:'var(--ok)'}}>{fmtEuro(totalDone)}</div>
            </div>
            {meetup.stock>0 && (
              <div style={{flex:1,background:'#061a0e',borderRadius:8,padding:'8px 10px',textAlign:'center'}}>
                <div style={{fontSize:9,color:'var(--muted)',fontWeight:700,letterSpacing:'1px',textTransform:'uppercase',marginBottom:3}}>Restant</div>
                <div style={{fontFamily:'Space Mono,monospace',fontSize:13,fontWeight:700,color:'#4FC3F7'}}>{fmtEuro(Math.max(0,meetup.stock-totalDone))}</div>
              </div>
            )}
          </div>
        </div>
      )}

      {pending.length===0&&done.length===0 && <div className="empty-txt">Aucun client pour le moment 👍</div>}
      {pending.length===0&&done.length>0 && <div className="empty-txt" style={{color:'var(--ok)'}}>🎉 Tous les clients ont été servis !</div>}

      {arrived.map(o=>{
        const isPending = pendingId===o.id;
        return (
          <div className="dv-order" key={o.id} style={{border:'2px solid #4FC3F7'}}>
            <div style={{background:'#001830',padding:'5px 13px',fontSize:11,color:'#4FC3F7',fontWeight:700}}>
              📍 CLIENT SUR PLACE
            </div>
            <div className="dv-order-top">
              <div className="dv-n" style={{color:'#4FC3F7'}}>!</div>
              <div className="dv-body">
                <div className="dv-client">{o.client}</div>
                {o.note && <div style={{background:'#1a1400',border:'1px solid #3a2e00',borderRadius:8,padding:'8px 10px',marginBottom:8,fontSize:13,color:'#FFD60A',lineHeight:'1.6',whiteSpace:'pre-wrap'}}>📋 {o.note}</div>}
                {!isPending ? (
                  <button className="dv-done" style={{width:'100%'}} onClick={()=>handleDone(o.id)}>✓ Client servi</button>
                ) : (
                  <div className="amount-box">
                    <div className="amount-box-lbl">💰 Montant encaissé ?</div>
                    <div className="amount-row">
                      <input className="amount-inp" type="number" inputMode="decimal" placeholder="0.00" value={amtVal}
                        onChange={e=>setAmtVal(e.target.value)} onKeyDown={e=>e.key==='Enter'&&confirm()} autoFocus/>
                      <span style={{color:'var(--ok)',fontWeight:700,fontSize:16}}>€</span>
                      <button className="amount-confirm" onClick={confirm}>✓ OK</button>
                      <button className="amount-skip" onClick={skip}>Passer</button>
                    </div>
                  </div>
                )}
              </div>
            </div>
            <div className="dv-order-footer">
              <span className="dv-added">Reçu {fmtTime(o.addedAt)}</span>
              <span className={`badge b-${urgency(o.deadline)}`}>{fmtCountdown(o.deadline)}</span>
            </div>
          </div>
        );
      })}

      {waiting.length>0 && (
        <>
          {arrived.length>0 && <div style={{margin:'12px 0 6px',fontSize:10,color:'var(--muted)',letterSpacing:'2px',textTransform:'uppercase',fontWeight:700,textAlign:'center'}}>En attente</div>}
          {waiting.map((o,i)=>(
            <div className="dv-order" key={o.id}>
              <div className="dv-order-top">
                <div className="dv-n">{i+1}</div>
                <div className="dv-body">
                  <div className="dv-client">{o.client}</div>
                  {o.note && <div style={{background:'#1a1400',border:'1px solid #3a2e00',borderRadius:8,padding:'8px 10px',fontSize:13,color:'#FFD60A',lineHeight:'1.6',whiteSpace:'pre-wrap'}}>📋 {o.note}</div>}
                </div>
              </div>
              <div className="dv-order-footer">
                <span className="dv-added">Reçu {fmtTime(o.addedAt)}</span>
                <span className={`badge b-${urgency(o.deadline)}`}>{fmtCountdown(o.deadline)}</span>
              </div>
            </div>
          ))}
        </>
      )}

      {done.length>0 && <>
        <div style={{margin:'16px 0 8px',fontSize:10,color:'var(--muted)',letterSpacing:'2px',textTransform:'uppercase',fontWeight:700,textAlign:'center'}}>✓ Déjà servis</div>
        {done.map(o=>(
          <div className="dv-order done" key={o.id}>
            <div className="dv-order-top">
              <div className="dv-n" style={{color:'var(--ok)'}}>✓</div>
              <div className="dv-body">
                <div className="dv-client">{o.client}</div>
                {o.note && <div style={{fontSize:11,color:'var(--muted)',marginTop:4}}>📋 {o.note}</div>}
              </div>
            </div>
            <div className="dv-order-footer">
              <span className="dv-added">Servi — {fmtTime(o.addedAt)}</span>
              {o.amount!=null && <span style={{fontFamily:'Space Mono,monospace',fontSize:12,color:'var(--ok)',fontWeight:700}}>{fmtEuro(o.amount)}</span>}
            </div>
          </div>
        ))}
      </>}
      <div style={{height:20}}/>
    </div>
  );
}

// ══════════════════════════════════════════════════════════
// HISTORY VIEW
// ══════════════════════════════════════════════════════════
function HistoryView() {
  const [history, setHistory] = useState({});
  useEffect(() => { dbOn('history', v => setHistory(v || {})); }, []);

  const entries = Object.entries(history).sort((a,b) => (b[1].savedAt||0) - (a[1].savedAt||0));

  return (
    <div className="content">
      <div style={{fontSize:10,fontWeight:700,letterSpacing:'2.5px',textTransform:'uppercase',color:'var(--muted)',padding:'4px 0 8px'}}>
        Historique des journées
      </div>
      {entries.length === 0 && <div className="empty-txt">Aucun historique — il apparaîtra après le premier reset journée</div>}
      {entries.map(([id, snap]) => {
        const orders = snap.orders || [];
        const done   = orders.filter(o => o.status === 'done');
        const total  = done.reduce((s,o) => s + (parseFloat(o.amount)||0), 0);
        return (
          <div className="card" key={id}>
            <div className="route-hdr">
              <span className="route-hdr-name">📅 {snap.date}</span>
              <span className="route-hdr-n">{done.length}/{orders.length} livrées</span>
            </div>
            {total > 0 && <div className="route-total">💰 Total encaissé : {fmtEuro(total)}</div>}
            {done.map((o,i) => (
              <div className="order-row" key={i} style={{opacity:.7}}>
                <div className="o-num" style={{color:'var(--ok)'}}>✓</div>
                <div className="o-body">
                  <div className="o-client">{o.client}</div>
                  <div className="o-addr">{o.address}</div>
                  {o.amount!=null && <div style={{fontSize:10,color:'var(--ok)',marginTop:2}}>💰 {fmtEuro(o.amount)}</div>}
                </div>
              </div>
            ))}
          </div>
        );
      })}
      <div style={{height:20}}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body>
</html>
