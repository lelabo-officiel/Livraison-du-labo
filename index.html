<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const PALETTE = ['#FF6B00','#00C4FF','#06D6A0','#FFD60A','#C77DFF','#FF4D6D'];
const DEADLINE_MS = 3 * 60 * 60 * 1000;
const STOP_SEC = 5 * 60;

const DEFAULT_DEPOT = {
  address: '14 rue Jules Massenet, 25200 Montbeliard',
  lat: 47.5158,
  lng: 6.7889
};

// ============================================================
// MOTEUR D'OPTIMISATION
// Objectif : minimiser l'attente totale des clients pending.
//
// IMPORTANT :
// - aucune priorite automatique aux anciens clients ;
// - aucun detour volontaire pour un client ancien ;
// - les clients +3h declenchent seulement une alerte visuelle admin ;
// - l'ordre est recalcule depuis la position courante du livreur ;
// - le retour depot n'est pas inclus dans l'optimisation.
// ============================================================

const OSRM_CACHE = new Map();
const COORD_PRECISION = 5;

function coordKey(p) {
  return `${p.lat.toFixed(COORD_PRECISION)},${p.lng.toFixed(COORD_PRECISION)}`;
}
function pairKey(a, b) {
  return `${coordKey(a)}|${coordKey(b)}`;
}
function hasCoords(o) {
  return o?.lat != null && o?.lng != null && !Number.isNaN(o.lat) && !Number.isNaN(o.lng);
}
function haversineKm(a, b) {
  if (!hasCoords(a) || !hasCoords(b)) return Infinity;
  const R = 6371, r = x => x * Math.PI / 180;
  const dLat = r(b.lat - a.lat), dLng = r(b.lng - a.lng);
  const aa = Math.sin(dLat/2)**2 + Math.cos(r(a.lat))*Math.cos(r(b.lat))*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(aa), Math.sqrt(1 - aa));
}
function haversineFallbackSec(a, b) {
  return haversineKm(a, b) / 50 * 3600;
}
async function getOSRMMatrix(points) {
  if (!points.length) return { matrix: [], failed: false };
  if (points.length === 1) return { matrix: [[0]], failed: false };

  let allCached = true;
  const cachedMatrix = points.map((_, i) =>
    points.map((_, j) => {
      if (i === j) return 0;
      const k = pairKey(points[i], points[j]);
      if (OSRM_CACHE.has(k)) return OSRM_CACHE.get(k);
      allCached = false;
      return null;
    })
  );
  if (allCached) return { matrix: cachedMatrix, failed: false };

  const coords = points.map(p => `${p.lng},${p.lat}`).join(';');
  const url = `https://router.project-osrm.org/table/v1/driving/${coords}?annotations=duration`;

  async function callOSRM() {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`OSRM HTTP ${res.status}`);
    const data = await res.json();
    if (data.code !== 'Ok' || !data.durations) throw new Error('OSRM bad response');
    for (let i = 0; i < points.length; i++) {
      for (let j = 0; j < points.length; j++) {
        if (i !== j && data.durations[i][j] != null) {
          OSRM_CACHE.set(pairKey(points[i], points[j]), data.durations[i][j]);
        }
      }
    }
    return { matrix: data.durations, failed: false };
  }

  try {
    return await callOSRM();
  } catch(e) {
    await new Promise(r => setTimeout(r, 800));
    try {
      return await callOSRM();
    } catch(e2) {
      console.warn('OSRM indisponible, fallback haversine', e2);
      const mat = points.map((a, i) => points.map((b, j) => i === j ? 0 : haversineFallbackSec(a, b)));
      return { matrix: mat, failed: true };
    }
  }
}

// Cout pur : somme des temps d'arrivee futurs.
// Plus cette somme est basse, moins les clients attendent globalement.
// Aucune ponderation liee a l'age de la commande.
function sumFutureWait(matrix, perm) {
  if (perm.length === 0) return 0;
  let elapsed = 0;
  let total = 0;

  for (let i = 0; i < perm.length; i++) {
    const from = i === 0 ? 0 : perm[i - 1];
    elapsed += matrix[from][perm[i]];

    if (i > 0) elapsed += STOP_SEC;

    total += elapsed;
  }

  return total;
}

// Duree affichee : position courante dernier client.
// Pas de retour depot.
function totalDurationCost(matrix, perm) {
  if (perm.length === 0) return 0;
  let cost = matrix[0][perm[0]];
  for (let i = 0; i < perm.length - 1; i++) cost += matrix[perm[i]][perm[i + 1]];
  return cost;
}

function arrivalSecAt(matrix, tour, posInTour) {
  let elapsed = 0;
  for (let i = 0; i <= posInTour; i++) {
    const from = i === 0 ? 0 : tour[i - 1];
    elapsed += matrix[from][tour[i]];
    if (i < posInTour) elapsed += STOP_SEC;
  }
  return elapsed;
}

function buildInsertion(matrix, n, costFn) {
  if (n === 0) return [];
  if (n === 1) return [1];

  let start = 1, startCost = costFn(matrix, [1]);
  for (let i = 2; i <= n; i++) {
    const c = costFn(matrix, [i]);
    if (c < startCost) { startCost = c; start = i; }
  }

  const tour = [start];
  const inserted = new Set([start]);

  while (inserted.size < n) {
    let bestP = -1, bestPos = -1, bestC = Infinity;

    for (let p = 1; p <= n; p++) {
      if (inserted.has(p)) continue;
      for (let pos = 0; pos <= tour.length; pos++) {
        const cand = tour.slice(0, pos).concat([p], tour.slice(pos));
        const c = costFn(matrix, cand);
        if (c < bestC) { bestC = c; bestP = p; bestPos = pos; }
      }
    }

    tour.splice(bestPos, 0, bestP);
    inserted.add(bestP);
  }

  return tour;
}

function twoOpt(matrix, tour, costFn) {
  const n = tour.length;
  if (n < 3) return tour;

  let improved = true, best = tour.slice(), bestC = costFn(matrix, best), it = 0;
  const MAX_ITER = 60;

  while (improved && it < MAX_ITER) {
    improved = false;
    it++;

    for (let i = 0; i < n - 1; i++) {
      for (let j = i + 1; j < n; j++) {
        const cand = best.slice(0, i).concat(best.slice(i, j + 1).reverse(), best.slice(j + 1));
        const c = costFn(matrix, cand);
        if (c < bestC - 0.001) {
          best = cand;
          bestC = c;
          improved = true;
        }
      }
    }
  }

  return best;
}

function orOpt(matrix, tour, costFn) {
  const n = tour.length;
  if (n < 4) return tour;

  let improved = true, best = tour.slice(), bestC = costFn(matrix, best), it = 0;
  const MAX_ITER = 60;

  while (improved && it < MAX_ITER) {
    improved = false;
    it++;

    for (const segLen of [1, 2, 3]) {
      if (segLen >= best.length) continue;

      for (let i = 0; i <= best.length - segLen; i++) {
        const seg = best.slice(i, i + segLen);
        const without = best.slice(0, i).concat(best.slice(i + segLen));

        for (let j = 0; j <= without.length; j++) {
          if (j === i) continue;

          for (const rev of (segLen > 1 ? [false, true] : [false])) {
            const piece = rev ? seg.slice().reverse() : seg;
            const cand = without.slice(0, j).concat(piece, without.slice(j));
            const c = costFn(matrix, cand);

            if (c < bestC - 0.001) {
              best = cand;
              bestC = c;
              improved = true;
            }
          }
        }
      }
    }
  }

  return best;
}

async function optimizeRouteOSRM(orders, startPos) {
  const valid = orders.filter(hasCoords);
  const invalid = orders.filter(o => !hasCoords(o));

  if (valid.length === 0) {
    return { ordered: invalid, sumWaitSec: 0, totalDurationSec: 0, osrmFailed: false, matrix: null, tour: [] };
  }

  const points = [startPos, ...valid.map(o => ({ lat: o.lat, lng: o.lng }))];
  const { matrix, failed } = await getOSRMMatrix(points);

  const costFn = (m, p) => sumFutureWait(m, p);

  if (valid.length === 1) {
    return {
      ordered: [...valid, ...invalid],
      sumWaitSec: matrix[0][1],
      totalDurationSec: matrix[0][1],
      osrmFailed: failed,
      matrix,
      tour: [1]
    };
  }

  let tour = buildInsertion(matrix, valid.length, costFn);
  tour = twoOpt(matrix, tour, costFn);
  tour = orOpt(matrix, tour, costFn);

  return {
    ordered: [...tour.map(idx => valid[idx - 1]), ...invalid],
    sumWaitSec: sumFutureWait(matrix, tour),
    totalDurationSec: totalDurationCost(matrix, tour),
    osrmFailed: failed,
    matrix,
    tour
  };
}

async function findBestDriverForOrder(newOrder, drivers, ordersByDriver, startPosByDriver) {
  const driverIds = Object.keys(drivers);
  if (driverIds.length === 0) return null;
  if (driverIds.length === 1) return driverIds[0];
  if (!hasCoords(newOrder)) return driverIds[0];

  let bestDid = null;
  let bestScore = Infinity;

  for (const did of driverIds) {
    const startPos = startPosByDriver[did];
    const currentOrders = (ordersByDriver[did] || []).filter(hasCoords);

    const before = await optimizeRouteOSRM(currentOrders, startPos);
    const after = await optimizeRouteOSRM([...currentOrders, newOrder], startPos);

    let arrivalNew = Infinity;
    if (after.matrix && after.tour.length > 0) {
      const newIdx = currentOrders.length + 1;
      const posInTour = after.tour.indexOf(newIdx);
      if (posInTour >= 0) arrivalNew = arrivalSecAt(after.matrix, after.tour, posInTour);
    }

    const deltaOthers = (after.sumWaitSec - arrivalNew) - before.sumWaitSec;
    const routeIncrease = after.totalDurationSec - before.totalDurationSec;

    // Score equilibre :
    // - livrer le nouveau client tot
    // - ne pas augmenter inutilement l'attente des autres
    // - ne pas rallonger la tournee pour rien
    const score = arrivalNew + 0.7 * Math.max(0, deltaOthers) + 0.3 * Math.max(0, routeIncrease);

    if (score < bestScore) {
      bestScore = score;
      bestDid = did;
    }
  }

  return bestDid;
}

// -- Geocodage -----------------------------------------------
async function geocodeAddress(address) {
  const res = await fetch(
    `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(address)}&format=json&limit=1`,
    { headers: {'Accept-Language':'fr-FR','User-Agent':'LivraisonApp/1.0'} }
  );
  const data = await res.json();
  if (!data.length) throw new Error('non trouvee');
  return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon), displayName: data[0].display_name };
}

// -- ETAs ----------------------------------------------------
async function calcETAs(orderedRoute, startPos) {
  if (!orderedRoute.length) return [];
  const valid = orderedRoute.filter(hasCoords);
  if (!valid.length) return orderedRoute.map(() => null);

  const points = [startPos, ...valid.map(o => ({ lat: o.lat, lng: o.lng }))];
  const { matrix } = await getOSRMMatrix(points);

  const etaByValidIdx = [];
  let t = Date.now();

  for (let i = 0; i < valid.length; i++) {
    const fromIdx = i === 0 ? 0 : i;
    t += matrix[fromIdx][i + 1] * 1000;
    etaByValidIdx.push(t);
    t += STOP_SEC * 1000;
  }

  let vIdx = 0;
  return orderedRoute.map(o => hasCoords(o) ? etaByValidIdx[vIdx++] : null);
}

function useETAs(route, startPos) {
  const [etas, setEtas] = useState([]);
  const key = route.map(o => `${o.id}:${o.lat ?? ''}:${o.lng ?? ''}`).join('|')
    + (startPos ? `|${startPos.lat},${startPos.lng}` : '');

  useEffect(() => {
    if (!route.length || !startPos) {
      setEtas([]);
      return;
    }

    let dead = false;
    calcETAs(route, startPos).then(r => { if (!dead) setEtas(r); });
    return () => { dead = true; };
  }, [key]);

  return etas;
}

function useOptimizedRoute(pendingOrders, startPos) {
  const [state, setState] = useState({
    ordered: [],
    sumWaitSec: 0,
    totalDurationSec: 0,
    osrmFailed: false,
    loading: true
  });

  const key = pendingOrders.map(o => `${o.id}:${o.lat ?? ''}:${o.lng ?? ''}:${o.addedAt || 0}`).join('|')
    + (startPos ? `|${startPos.lat.toFixed(5)},${startPos.lng.toFixed(5)}` : '');

  useEffect(() => {
    if (!pendingOrders.length) {
      setState({ ordered: [], sumWaitSec: 0, totalDurationSec: 0, osrmFailed: false, loading: false });
      return;
    }

    if (!startPos) {
      setState({ ordered: pendingOrders, sumWaitSec: 0, totalDurationSec: 0, osrmFailed: false, loading: false });
      return;
    }

    let dead = false;
    setState(s => ({ ...s, loading: true }));

    optimizeRouteOSRM(pendingOrders, startPos).then(r => {
      if (!dead) setState({ ...r, loading: false });
    });

    return () => { dead = true; };
  }, [key]);

  return state;
}

// -- Formatters ----------------------------------------------
const fmtTime = ts => new Date(ts).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
const fmtCountdown = d => {
  const ms = d - Date.now();
  if (ms <= 0) return 'EN RETARD';
  const h = Math.floor(ms/3600000), m = Math.floor((ms%3600000)/60000);
  return h > 0 ? `${h}h${String(m).padStart(2,'0')}` : `${m}min`;
};
const fmtDuration = sec => {
  if (!sec || sec <= 0) return '-';
  const m = Math.round(sec / 60);
  if (m < 60) return `${m} min`;
  const h = Math.floor(m / 60), mm = m % 60;
  return `${h}h${String(mm).padStart(2,'0')}`;
};
const urgency = d => {
  const ms = d - Date.now();
  if (ms <= 0) return 'late';
  if (ms < 45*60000) return 'critical';
  if (ms < 90*60000) return 'warn';
  return 'ok';
};
const isOverThreeHours = o => Date.now() - (o.addedAt || Date.now()) >= DEADLINE_MS;
const wazeUrl = o => hasCoords(o)
  ? `https://waze.com/ul?ll=${o.lat},${o.lng}&navigate=yes`
  : `https://waze.com/ul?q=${encodeURIComponent(o.address || '')}&navigate=yes`;
const fmtEuro = v => v != null && v !== '' ? `${parseFloat(v).toFixed(2).replace('.',',')} EUR` : null;

function parseTimeToTs(str) {
  const parts = str.trim().replace('h',':').split(':');
  if (parts.length < 2) return null;
  const h = parseInt(parts[0]), m = parseInt(parts[1]);
  if (isNaN(h) || isNaN(m) || h > 23 || m > 59) return null;
  const d = new Date();
  d.setHours(h, m, 0, 0);
  return d.getTime();
}

// -- Firebase helpers ----------------------------------------
const dbRef  = p => window._dbRef(window._db, p);
const dbUpd  = (p, v) => window._dbUpd(dbRef(p), v);
const dbPush = (p, v) => window._dbPush(dbRef(p), v);
const dbRem  = p => window._dbRem(dbRef(p));
const dbOn   = (p, cb) => window._dbOn(dbRef(p), s => cb(s.val()));

function Toast({ msg, onDone }) {
  useEffect(() => {
    const t = setTimeout(onDone, 2200);
    return () => clearTimeout(t);
  }, []);
  return <div className="toast">{msg}</div>;
}

function Over3hAlert({ order }) {
  if (!isOverThreeHours(order)) return null;
  return <div className="alert-3h">ALERTE Client +3h - a verifier manuellement</div>;
}

// APP
// ============================================================
function App() {
  const [fbReady, setFbReady] = useState(!!window._firebaseReady);
  const [drivers, setDrivers] = useState({});
  const [meetups, setMeetups] = useState({});
  const [orders, setOrders] = useState({});
  const [screen, setScreen] = useState(() => {
    const h = window.location.hash;
    if (h.startsWith('#driver-')) return h.slice(1);
    if (h.startsWith('#track-'))  return h.slice(1);
    if (h.startsWith('#meetup-')) return h.slice(1);
    return 'admin';
  });
  const [toast, setToast] = useState('');
  const [, tick] = useState(0);

  useEffect(() => {
    if (!fbReady) window.addEventListener('firebaseReady', () => setFbReady(true));
  }, []);

  useEffect(() => {
    const t = setInterval(() => tick(n => n + 1), 60000);
    return () => clearInterval(t);
  }, []);

  useEffect(() => {
    if (!fbReady) return;
    dbOn('drivers', v => setDrivers(v || {}));
    dbOn('meetups', v => setMeetups(v || {}));
    dbOn('orders',  v => setOrders(v  || {}));
  }, [fbReady]);

  useEffect(() => {
    if (screen.startsWith('driver-') || screen.startsWith('track-') || screen.startsWith('meetup-')) {
      window.location.hash = screen;
    } else {
      history.replaceState(null, '', window.location.pathname);
    }
  }, [screen]);

  async function addDriver(name) {
    if (!name.trim()) return;
    await dbPush('drivers', {
      name: name.trim(),
      color: PALETTE[Object.keys(drivers).length % PALETTE.length],
      baseAddress: DEFAULT_DEPOT.address,
      baseLat: DEFAULT_DEPOT.lat,
      baseLng: DEFAULT_DEPOT.lng
    });
  }

  async function removeDriver(id) {
    await dbRem(`drivers/${id}`);
    Object.entries(orders).forEach(([oid, o]) => {
      if (o.driverId === id) dbUpd(`orders/${oid}`, { driverId: null });
    });
  }

  async function updateDriver(id, p) {
    await dbUpd(`drivers/${id}`, p);
  }

  async function addMeetup(name) {
    if (!name.trim()) return;
    const color = PALETTE[(Object.keys(drivers).length + Object.keys(meetups).length) % PALETTE.length];
    await dbPush('meetups', { name: name.trim(), color });
  }

  async function removeMeetup(id) {
    await dbRem(`meetups/${id}`);
    Object.entries(orders).forEach(([oid, o]) => {
      if (o.meetupId === id) dbUpd(`orders/${oid}`, { meetupId: null });
    });
  }

  async function updateMeetup(id, p) {
    await dbUpd(`meetups/${id}`, p);
  }

  async function updateOrder(id, p) {
    await dbUpd(`orders/${id}`, p);
  }

  async function deleteOrder(id) {
    await dbRem(`orders/${id}`);
  }

  function depotFor(did) {
    const d = drivers[did];
    if (d?.baseLat != null && d?.baseLng != null) return { lat: d.baseLat, lng: d.baseLng };
    return { lat: DEFAULT_DEPOT.lat, lng: DEFAULT_DEPOT.lng };
  }

  function currentPosFor(did) {
    const doneList = Object.values(orders)
      .filter(o => o.driverId === did && o.status === 'done' && hasCoords(o) && o.deliveredAt)
      .sort((a, b) => b.deliveredAt - a.deliveredAt);

    if (doneList.length > 0) return { lat: doneList[0].lat, lng: doneList[0].lng };
    return depotFor(did);
  }

  function pendingFor(did) {
    return Object.entries(orders)
      .filter(([, o]) => o.driverId === did && o.status !== 'done')
      .map(([id, o]) => ({ ...o, id }));
  }

  function getDone(did) {
    return Object.entries(orders)
      .filter(([, o]) => o.driverId === did && o.status === 'done')
      .map(([id, o]) => ({ ...o, id }))
      .sort((a, b) => b.addedAt - a.addedAt);
  }

  function getMeetupOrders(mid) {
    return Object.entries(orders)
      .filter(([, o]) => o.meetupId === mid && o.status !== 'done')
      .map(([id, o]) => ({ ...o, id }))
      .sort((a, b) => a.addedAt - b.addedAt);
  }

  function getMeetupDone(mid) {
    return Object.entries(orders)
      .filter(([, o]) => o.meetupId === mid && o.status === 'done')
      .map(([id, o]) => ({ ...o, id }))
      .sort((a, b) => b.addedAt - a.addedAt);
  }

  if (!fbReady) {
    return (
      <div className="app">
        <div className="empty-txt" style={{marginTop:80}}>
          <div className="spin" style={{width:24,height:24,margin:'0 auto 12px'}}/> Connexion...
        </div>
      </div>
    );
  }

  const isDriverScreen = screen.startsWith('driver-');
  const isTrackScreen  = screen.startsWith('track-');
  const isMeetupScreen = screen.startsWith('meetup-');
  const driverId       = isDriverScreen ? screen.replace('driver-', '') : null;
  const trackOrderId   = isTrackScreen  ? screen.replace('track-', '')  : null;
  const meetupId       = isMeetupScreen ? screen.replace('meetup-', '') : null;
  const curDriver      = driverId ? drivers[driverId] : null;
  const curMeetup      = meetupId ? meetups[meetupId] : null;
  const isDirectLink   = (isDriverScreen || isTrackScreen || isMeetupScreen) && !!window.location.hash;

  if (isTrackScreen && isDirectLink) {
    const order = orders[trackOrderId];
    if (!order) {
      return (
        <div className="app">
          <header className="hdr"><span className="hdr-logo">LIVR<em>AI</em>SON</span></header>
          <div className="empty-txt" style={{marginTop:60}}>
            <div className="spin" style={{width:24,height:24,margin:'0 auto 12px'}}/> Chargement...
          </div>
        </div>
      );
    }

    return (
      <div className="app">
        <header className="hdr"><span className="hdr-logo">LIVR<em>AI</em>SON</span></header>
        <CustomerView
          order={{...order, id: trackOrderId}}
          pendingForDriver={order.driverId ? pendingFor(order.driverId) : []}
          depot={order.driverId ? currentPosFor(order.driverId) : null}
        />
      </div>
    );
  }

  if (isDriverScreen && isDirectLink && curDriver) {
    return (
      <div className="app">
        <header className="hdr"><span className="hdr-logo">LIVR<em>AI</em>SON</span></header>
        <DriverView
          driver={{...curDriver, id: driverId}}
          pending={pendingFor(driverId)}
          done={getDone(driverId)}
          depot={currentPosFor(driverId)}
          onDone={(id, amt) => updateOrder(id, { status:'done', amount:amt ?? null, deliveredAt:Date.now() })}
          onBack={null}
        />
        {toast && <Toast msg={toast} onDone={() => setToast('')}/>}
      </div>
    );
  }

  if (isMeetupScreen && isDirectLink && curMeetup) {
    return (
      <div className="app">
        <header className="hdr"><span className="hdr-logo">LIVR<em>AI</em>SON</span></header>
        <MeetupView
          meetup={{...curMeetup, id: meetupId}}
          pending={getMeetupOrders(meetupId)}
          done={getMeetupDone(meetupId)}
          onDone={(id, amt) => updateOrder(id, { status:'done', amount:amt ?? null, deliveredAt:Date.now() })}
          onBack={null}
        />
        {toast && <Toast msg={toast} onDone={() => setToast('')}/>}
      </div>
    );
  }

  return (
    <div className="app">
      <header className="hdr">
        <span className="hdr-logo">LIVR<em>AI</em>SON</span>
        {isDriverScreen ? (
          <button className="tab on" onClick={() => setScreen('driver-select')}>Retour</button>
        ) : (
          <>
            <button className={`tab ${screen === 'admin' ? 'on' : ''}`} onClick={() => setScreen('admin')}>Admin</button>
            <button className={`tab ${screen === 'history' ? 'on' : ''}`} onClick={() => setScreen('history')}>[NOTE]</button>
            <button className={`tab ${screen === 'driver-select' ? 'on' : ''}`} onClick={() => setScreen('driver-select')}>Chauffeur</button>
          </>
        )}
      </header>

      {screen === 'admin' && (
        <AdminView
          drivers={drivers}
          meetups={meetups}
          orders={orders}
          pendingFor={pendingFor}
          getDone={getDone}
          currentPosFor={currentPosFor}
          getMeetupOrders={getMeetupOrders}
          getMeetupDone={getMeetupDone}
          addDriver={addDriver}
          removeDriver={removeDriver}
          updateDriver={updateDriver}
          addMeetup={addMeetup}
          removeMeetup={removeMeetup}
          updateMeetup={updateMeetup}
          updateOrder={updateOrder}
          deleteOrder={deleteOrder}
          resetAll={async () => {
            const date = new Date().toLocaleDateString('fr-FR');
            const snap = { date, savedAt: Date.now(), orders: Object.values(orders) };
            await dbPush('history', snap);
            for (const id of Object.keys(orders)) await dbRem(`orders/${id}`);
          }}
          onToast={setToast}
        />
      )}

      {screen === 'history' && <HistoryView/>}

      {screen === 'driver-select' && (
        <SelectDriver drivers={drivers} orders={orders} onSelect={id => setScreen(`driver-${id}`)}/>
      )}

      {isDriverScreen && curDriver && (
        <DriverView
          driver={{...curDriver, id: driverId}}
          pending={pendingFor(driverId)}
          done={getDone(driverId)}
          depot={currentPosFor(driverId)}
          onDone={(id, amt) => updateOrder(id, { status:'done', amount:amt ?? null, deliveredAt:Date.now() })}
          onBack={() => setScreen('driver-select')}
        />
      )}

      {toast && <Toast msg={toast} onDone={() => setToast('')}/>}
    </div>
  );
}

function AdminView({
  drivers, meetups, orders, pendingFor, getDone, currentPosFor,
  getMeetupOrders, getMeetupDone,
  addDriver, removeDriver, updateDriver,
  addMeetup, removeMeetup, updateMeetup,
  updateOrder, deleteOrder, resetAll, onToast
}) {
  const [newName, setNewName] = useState('');
  const [newMeetupName, setNewMeetupName] = useState('');
  const [form, setForm] = useState({client:'', address:'', meetupId:'', note:''});
  const [loading, setLoading] = useState(false);
  const [loadingMsg, setLoadingMsg] = useState('');
  const [err, setErr] = useState('');

  async function handleAdd() {
    if (!form.client.trim()) return;

    const isMeetup = !!form.meetupId;
    if (!isMeetup && !form.address.trim()) return;

    setLoading(true);
    setErr('');

    const ts = Date.now();

    if (isMeetup) {
      const order = {
        client: form.client.trim(),
        address: '',
        note: form.note.trim(),
        driverId: null,
        meetupId: form.meetupId,
        addedAt: ts,
        deadline: ts + DEADLINE_MS,
        status: 'pending',
        lat: null,
        lng: null,
        displayName: null
      };

      await dbPush('orders', order);
      setForm({client:'', address:'', meetupId:'', note:''});
      setLoading(false);
      return;
    }

    setLoadingMsg('[GPS] Localisation GPS...');

    let geo = null;
    try {
      geo = await geocodeAddress(form.address.trim());
    } catch(e) {
      setErr("GPS non trouve - verifie l'adresse ou ajoute la ville");
      setLoading(false);
      setLoadingMsg('');
      return;
    }

    const driverIds = Object.keys(drivers);
    if (driverIds.length === 0) {
      setErr("Aucun chauffeur - ajoute un chauffeur d'abord");
      setLoading(false);
      setLoadingMsg('');
      return;
    }

    setLoadingMsg('[AUTO] Recherche du meilleur livreur...');

    const ordersByDriver = {};
    for (const did of driverIds) ordersByDriver[did] = pendingFor(did);

    const startPosByDriver = {};
    for (const did of driverIds) startPosByDriver[did] = currentPosFor(did);

    const tempOrder = { ...form, lat: geo.lat, lng: geo.lng, addedAt: ts, id: '__temp__' };
    let assignedDriverId = null;

    try {
      assignedDriverId = await findBestDriverForOrder(tempOrder, drivers, ordersByDriver, startPosByDriver);
    } catch(e) {
      console.error('Affectation auto echouee', e);
      assignedDriverId = driverIds[0];
    }

    const order = {
      client: form.client.trim(),
      address: form.address.trim(),
      note: form.note.trim(),
      driverId: assignedDriverId,
      meetupId: null,
      addedAt: ts,
      deadline: ts + DEADLINE_MS,
      status: 'pending',
      lat: geo.lat,
      lng: geo.lng,
      displayName: geo.displayName
    };

    await dbPush('orders', order);
    setForm({client:'', address:'', meetupId:'', note:''});
    setLoading(false);
    setLoadingMsg('');

    if (assignedDriverId && drivers[assignedDriverId]) {
      onToast(`OK Attribue a ${drivers[assignedDriverId].name}`);
    }
  }

  async function reassignAuto(orderId) {
    const o = orders[orderId];
    if (!o || !hasCoords(o)) {
      onToast('[ERREUR] Pas de coordonnees GPS');
      return;
    }

    const driverIds = Object.keys(drivers);
    if (driverIds.length === 0) return;

    const ordersByDriver = {};
    for (const did of driverIds) {
      ordersByDriver[did] = pendingFor(did).filter(x => x.id !== orderId);
    }

    const startPosByDriver = {};
    for (const did of driverIds) startPosByDriver[did] = currentPosFor(did);

    const best = await findBestDriverForOrder({...o, id: orderId}, drivers, ordersByDriver, startPosByDriver);

    if (best && best !== o.driverId) {
      await updateOrder(orderId, { driverId: best });
      onToast(`OK Reattribue a ${drivers[best].name}`);
    } else {
      onToast('OK Deja chez le meilleur livreur');
    }
  }

  const unassigned = Object.entries(orders).filter(([, o]) => !o.driverId && !o.meetupId && o.status !== 'done');

  return (
    <div className="content">

      <div className="card">
        <div className="card-pad">
          <div className="sec-label">Nouvelle commande</div>

          <div className="fld">
            <label className="fld-lbl">Nom du client</label>
            <input className="inp" placeholder="Ex : Mohammed D." value={form.client}
              onChange={e => setForm(f => ({...f, client:e.target.value}))}/>
          </div>

          <div className="fld">
            <label className="fld-lbl">Type</label>
            <select className="inp" value={form.meetupId ? 'meetup' : 'delivery'}
              onChange={e => {
                if (e.target.value === 'delivery') setForm(f => ({...f, meetupId:''}));
                else setForm(f => ({...f, address:''}));
              }}>
              <option value="delivery">[LIV] Livraison a domicile (attribution auto)</option>
              <option value="meetup">[GPS] Meet up (sur place)</option>
            </select>
          </div>

          {!form.meetupId ? (
            <div className="fld">
              <label className="fld-lbl">Adresse de livraison</label>
              <input className="inp" placeholder="Ex : 14 rue de la Paix, Belfort" value={form.address}
                onChange={e => setForm(f => ({...f, address:e.target.value}))}
                onKeyDown={e => e.key === 'Enter' && handleAdd()}/>
              <div style={{fontSize:10,color:'var(--muted)',marginTop:5,fontStyle:'italic'}}>
                [AUTO] Optimisation pure : attente totale minimale, sans priorite automatique aux anciens clients.
              </div>
            </div>
          ) : (
            <div className="fld">
              <label className="fld-lbl">Point Meet up</label>
              <select className="inp" value={form.meetupId} onChange={e => setForm(f => ({...f, meetupId:e.target.value}))}>
                <option value="">- Choisir un point</option>
                {Object.entries(meetups).map(([id, m]) => <option key={id} value={id}>{m.name}</option>)}
              </select>
            </div>
          )}

          <div className="fld">
            <label className="fld-lbl">Message pour le livreur</label>
            <textarea className="inp" rows={3} value={form.note}
              placeholder="Ex : 2x burger, 1x frites - 24EUR - code: 1492"
              onChange={e => setForm(f => ({...f, note:e.target.value}))}
              style={{resize:'none',lineHeight:'1.5'}}/>
          </div>

          {loading && <div className="geocoding-row"><span className="spin"/> {loadingMsg}</div>}
          {err && <div className="err">ALERTE {err}</div>}

          <button className="btn-main" onClick={handleAdd}
            disabled={!form.client.trim() || ((!form.meetupId && !form.address.trim()) || (form.meetupId === '' && Object.keys(drivers).length === 0)) || loading}>
            + Ajouter la commande
          </button>
        </div>
      </div>

      <div className="card">
        <div className="card-pad" style={{paddingBottom:0}}>
          <div className="sec-label">Chauffeurs ({Object.keys(drivers).length})</div>
        </div>

        {Object.keys(drivers).length === 0 && <div className="empty-txt">Aucun chauffeur</div>}

        {Object.entries(drivers).map(([id, d]) => {
          const n = Object.values(orders).filter(o => o.driverId === id && o.status !== 'done').length;
          const link = `${window.location.href.split('#')[0]}#driver-${id}`;
          return (
            <div key={id}>
              <div className="driver-row">
                <div className="dot" style={{background:d.color}}/>
                <span className="driver-row-name">{d.name}</span>
                <span className="driver-row-n">{n} cmd</span>
                <button className="btn-sm" style={{color:'var(--ok)'}} onClick={() => {
                  navigator.clipboard.writeText(link);
                  onToast('[LIEN] Lien copie !');
                }}>[LIEN] Lien</button>
                <button className="btn-sm btn-del" onClick={() => removeDriver(id)}>X</button>
              </div>
              <DriverBaseRow driver={{...d, id}} onUpdate={updateDriver}/>
            </div>
          );
        })}

        <div className="add-row">
          <input className="add-inp" placeholder="Prenom du chauffeur" value={newName}

            onKeyDown={e => { if (e.key === 'Enter' && newName.trim()) { addDriver(newName); setNewName(''); } }}/>

        <div className="card-pad" style={{paddingBottom:0}}>

function DriverBaseRow({ driver, onUpdate }) {
  const [editingAddr, setEditingAddr] = useState(false);
  const [editingStock, setEditingStock] = useState(false);
  const [addrVal, setAddrVal] = useState(driver.baseAddress || '');
  const [stockVal, setStockVal] = useState('');
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');

  const isDefault = driver.baseAddress === DEFAULT_DEPOT.address;

  async function saveAddr() {
    if (!addrVal.trim()) return;
    setLoading(true);
    setErr('');

    try {
      const geo = await geocodeAddress(addrVal.trim());
      await onUpdate(driver.id, {baseAddress:addrVal.trim(), baseLat:geo.lat, baseLng:geo.lng});
      setEditingAddr(false);
    } catch(e) {
      setErr('Adresse non trouvee');
    } finally {
      setLoading(false);
    }
  }

  async function resetToDefault() {
    await onUpdate(driver.id, {
      baseAddress: DEFAULT_DEPOT.address,
      baseLat: DEFAULT_DEPOT.lat,
      baseLng: DEFAULT_DEPOT.lng
    });
  }

  async function saveStock() {
    const v = parseFloat(stockVal.replace(',', '.'));
    await onUpdate(driver.id, {stock:isNaN(v) ? null : v});
    setEditingStock(false);
  }

  return (
    <div style={{borderBottom:'1px solid var(--border)'}}>
      <div style={{padding:'6px 14px 6px'}}>
        {!editingAddr ? (
          <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
            <span style={{fontSize:11,color:driver.baseLat?'var(--ok)':'var(--muted)'}}>
              {driver.baseLat ? `[GPS] ${driver.baseAddress}${isDefault ? ' (depot par defaut)' : ''}` : '[GPS] Aucun point de depart'}
            </span>
            <button className="btn-sm" onClick={() => { setAddrVal(driver.baseAddress || ''); setEditingAddr(true); }}>
              {driver.baseLat ? 'Modifier' : '+ Definir'}
            </button>
            {!isDefault && driver.baseLat && (
              <button className="btn-sm" onClick={resetToDefault} title="Revenir au depot par defaut">Reset Defaut</button>
            )}
          </div>
        ) : (
          <div style={{display:'flex',flexDirection:'column',gap:6}}>
            <div style={{display:'flex',gap:6}}>
              <input className="add-inp" style={{fontSize:13}} autoFocus
                placeholder="Adresse de depart" value={addrVal}
                onChange={e => setAddrVal(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && saveAddr()}/>
              <button className="btn-add" onClick={saveAddr} disabled={loading || !addrVal.trim()}>{loading ? '...' : 'OK'}</button>
              <button className="btn-sm" onClick={() => setEditingAddr(false)}>X</button>
            </div>
            {err && <span style={{fontSize:11,color:'var(--crit)'}}>{err}</span>}
          </div>
        )}
      </div>

      <div style={{padding:'0 14px 8px'}}>
        {!editingStock ? (
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:11,color:driver.stock>0?'var(--warn)':'var(--muted)'}}>
              {driver.stock > 0 ? `[STOCK] Stock : ${fmtEuro(driver.stock)}` : '[STOCK] Aucun stock defini'}
            </span>
            <button className="btn-sm" onClick={() => {
              setStockVal(driver.stock > 0 ? String(driver.stock) : '');
              setEditingStock(true);
            }}>
              {driver.stock > 0 ? 'Modifier' : '+ Definir'}
            </button>
          </div>
        ) : (
          <div style={{display:'flex',gap:6,alignItems:'center'}}>
            <input className="add-inp" style={{fontSize:13,width:120}} autoFocus type="number" inputMode="decimal"
              placeholder="Ex: 5000" value={stockVal}
              onChange={e => setStockVal(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && saveStock()}/>
            <span style={{color:'var(--warn)',fontWeight:700}}>EUR</span>
            <button className="btn-add" onClick={saveStock} disabled={!stockVal.trim()}>OK</button>
            <button className="btn-sm" onClick={() => setEditingStock(false)}>X</button>
          </div>
        )}
      </div>
    </div>
  );
}

          fontSize:13,cursor:'pointer'

  return (
    <div style={{background:'#1a0505',border:'2px solid var(--crit)',borderRadius:12,padding:16,textAlign:'center'}}>
      <div style={{fontSize:14,fontWeight:700,color:'var(--crit)',marginBottom:8}}>ALERTE Supprimer toutes les commandes du jour ?</div>

function DriverView({ driver, pending, done, depot, onDone, onBack }) {
  const { ordered: route, totalDurationSec, osrmFailed, loading } = useOptimizedRoute(pending, depot);
  const etas = useETAs(route, depot);
  const [time, setTime] = useState(new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}));
  const [pendingId, setPending] = useState(null);
  const [amtVal, setAmtVal] = useState('');
  const [etaOpenId, setEtaOpen] = useState(null);
  const [etaInputVal, setEtaInputVal] = useState('');
  const prevRouteLen = useRef(route.length);

  useEffect(() => {
    const t = setInterval(() => setTime(new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})), 30000);
    return () => clearInterval(t);
  }, []);

  useEffect(() => {
    if ('Notification' in window && Notification.permission === 'default') {
      Notification.requestPermission();
    }
  }, []);

  useEffect(() => {
    if (route.length > prevRouteLen.current) {
      const newest = route[route.length - 1];
      if (newest && Notification.permission === 'granted') {
        new Notification('[LIV] Nouvelle livraison !', {
          body: `${newest.client} - ${newest.address}`,
          icon: '/favicon.ico'
        });
      }
    }
    prevRouteLen.current = route.length;
  }, [route.length]);

  function handleLivre(id) {
    setPending(id);
    setAmtVal('');
  }

  function confirm() {
    onDone(pendingId, amtVal !== '' ? parseFloat(amtVal.replace(',', '.')) : null);
    setPending(null);
  }

  function skip() {
    onDone(pendingId, null);
    setPending(null);
  }

  function openEta(id) {
    setEtaOpen(id);
    setEtaInputVal('');
  }

  function confirmEta(id) {
    const ts = parseTimeToTs(etaInputVal);
    if (ts) dbUpd(`orders/${id}`, {driverEta: ts});
    setEtaOpen(null);
  }

  const totalDone = done.reduce((s, o) => s + (parseFloat(o.amount) || 0), 0);

  return (
    <div className="dv-wrap">
      <div className="dv-hdr">
        <div className="dot" style={{background:driver.color,width:12,height:12}}/>
        <span className="dv-hdr-name">{driver.name}</span>
        {onBack && <button className="dv-back" onClick={onBack}>Changer</button>}
      </div>

      {loading && (
        <div style={{background:'#001830',border:'1px solid var(--blue)',color:'var(--blue)',borderRadius:10,padding:'10px 14px',marginBottom:10,textAlign:'center',fontSize:12,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
          <span className="spin"/> Calcul de ta tournee optimale...
        </div>
      )}

      {osrmFailed && !loading && (
        <div style={{background:'#2a0b12',border:'1px solid var(--crit)',color:'var(--crit)',borderRadius:10,padding:'10px 14px',marginBottom:10,textAlign:'center',fontSize:12,fontWeight:700}}>

      <div className="dv-clock">

        <div style={{textAlign:'right'}}><div className="dv-clock-lbl">Restantes</div><div>{route.length}</div></div>
      </div>

      {!loading && route.length > 1 && (

          [HEURE] Tournee estimee : ~{fmtDuration(totalDurationSec)} jusqu'au dernier client

                    [NOTE] {o.note}
                  </div>
                )}

                {!isPending ? (
                  <>
                    <div className="dv-btns">
                      <a className="dv-maps" href={wazeUrl(o)} target="_blank">[WAZE] Waze</a>
                      <button className="dv-done" onClick={() => handleLivre(o.id)}>OK Livre</button>
                    </div>

                    {etaOpenId !== o.id ? (
                      <button onClick={() => openEta(o.id)} style={{
                        marginTop:6,background:'transparent',border:'1px solid #003a5a',
                        color:'var(--blue)',borderRadius:7,padding:'5px 10px',fontSize:11,
                        fontFamily:'inherit',cursor:'pointer',width:'100%'
                      }}>[ETA] Saisir heure arrivee Waze</button>
                    ) : (
                      <div style={{marginTop:6,background:'#001830',border:'1px solid #003a5a',borderRadius:8,padding:10}}>
                        <div style={{fontSize:11,color:'var(--blue)',fontWeight:700,marginBottom:6}}>[ETA] Heure Waze</div>
                        <div style={{display:'flex',gap:6}}>
                          <input style={{flex:1,background:'var(--s2)',border:'1.5px solid var(--blue)',color:'var(--text)',borderRadius:7,padding:'7px 10px',fontSize:22,fontFamily:'Space Mono,monospace',fontWeight:700,outline:'none',letterSpacing:4,textAlign:'center'}}
                            placeholder="11:30" value={etaInputVal} inputMode="numeric" maxLength={5}
                            onChange={e => {
                              let raw = e.target.value.replace(/\D/g,'').slice(0,4);
                              let fmt = raw.length > 2 ? raw.slice(0,2) + ':' + raw.slice(2) : raw;
                              setEtaInputVal(fmt);
                            }}
                            onKeyDown={e => {
                              if (e.key === 'Enter' && etaInputVal.length === 5) confirmEta(o.id);
                              if (e.key === 'Backspace' && etaInputVal.endsWith(':')) {
                                e.preventDefault();
                                setEtaInputVal(etaInputVal.slice(0,1));
                              }
                            }}
                            autoFocus/>
                          <button onClick={() => { if (etaInputVal.length === 5) confirmEta(o.id); }}
                            disabled={etaInputVal.length !== 5}
                            style={{background:etaInputVal.length === 5 ? 'var(--blue)' : '#003a5a',color:etaInputVal.length === 5 ? '#000' : '#555',border:'none',borderRadius:7,padding:'7px 14px',fontWeight:800,cursor:etaInputVal.length === 5 ? 'pointer' : 'not-allowed',fontFamily:'inherit',fontSize:14}}>OK</button>
                          <button onClick={() => setEtaOpen(null)}
                            style={{background:'transparent',border:'1px solid var(--border)',color:'var(--muted)',borderRadius:7,padding:'7px 8px',cursor:'pointer',fontFamily:'inherit'}}>X</button>
                        </div>
                      </div>
                    )}

                    {o.driverEta && etaOpenId !== o.id && (
                      <div style={{marginTop:4,fontSize:11,color:'var(--blue)',textAlign:'center'}}>
                        [ETA] Arrivee confirmee : {fmtTime(o.driverEta)}
                        <button onClick={() => openEta(o.id)} style={{marginLeft:6,background:'transparent',border:'none',color:'var(--muted)',fontSize:10,cursor:'pointer'}}>modifier</button>
                      </div>
                    )}
                  </>
                ) : (
                  <div className="amount-box">
                    <div className="amount-box-lbl">[EUR] Montant encaisse ?</div>
                    <div className="amount-row">
                      <input className="amount-inp" type="number" inputMode="decimal"
                        placeholder="0.00" value={amtVal}
                        onChange={e => setAmtVal(e.target.value)}
                        onKeyDown={e => e.key === 'Enter' && confirm()}
                        autoFocus/>
                      <span style={{color:'var(--ok)',fontWeight:700,fontSize:16}}>EUR</span>
                      <button className="amount-confirm" onClick={confirm}>OK OK</button>
                      <button className="amount-skip" onClick={skip}>Passer</button>
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div className="dv-order-footer">
              <span className="dv-added">Recu {fmtTime(o.addedAt)}</span>
              <div style={{display:'flex',gap:6,flexWrap:'wrap',justifyContent:'flex-end'}}>
                {eta && <span className="badge b-eta">[HEURE] ~{fmtTime(eta)}</span>}
                <span className={`badge b-${u}`}>avant {fmtTime(o.deadline)}  {fmtCountdown(o.deadline)}</span>
              </div>
            </div>
          </div>
        );
      })}

      {done.length > 0 && (
        <>
          <div style={{margin:'16px 0 8px',fontSize:10,color:'var(--muted)',letterSpacing:'2px',textTransform:'uppercase',fontWeight:700,textAlign:'center'}}>
            OK Deja livrees
          </div>
          {done.map(o => (
            <DoneOrderRow key={o.id} order={o}
              onUpdate={(id, patch) => dbUpd(`orders/${id}`, patch)}
              onDelete={() => {}}
              compact={true}/>
          ))}
        </>
      )}

      <div style={{height:20}}/>
    </div>
  );
}

function DoneOrderRow({ order: o, onUpdate, onDelete, compact=false }) {
  const [editing, setEditing] = useState(false);
  const [val, setVal] = useState('');

  function startEdit() {
    setVal(o.amount != null ? String(o.amount) : '');
    setEditing(true);
  }

  function save() {
    const parsed = val.trim() === '' ? null : parseFloat(val.replace(',', '.'));
    onUpdate(o.id, { amount:isNaN(parsed) ? null : parsed });
    setEditing(false);
  }

  if (compact) {
    return (
      <div className="dv-order done">
        <div className="dv-order-top">
          <div className="dv-n" style={{color:'var(--ok)'}}>OK</div>
          <div className="dv-body">
            <div className="dv-client">{o.client}</div>
            <div className="dv-addr">{o.displayName || o.address}</div>
            {o.note && <div style={{fontSize:11,color:'var(--muted)',marginTop:4}}>[NOTE] {o.note}</div>}
          </div>
        </div>
        <div className="dv-order-footer">
          <span className="dv-added">Livre - {fmtTime(o.addedAt)}</span>
          <div style={{display:'flex',gap:6,alignItems:'center'}}>
            {!editing ? (
              <>
                {o.amount != null && <span style={{fontFamily:'Space Mono,monospace',fontSize:12,color:'var(--ok)',fontWeight:700}}>{fmtEuro(o.amount)}</span>}
                <button onClick={startEdit} style={{background:'transparent',border:'1px solid #3a3a3a',color:'var(--muted)',borderRadius:5,padding:'2px 7px',fontSize:10,cursor:'pointer',fontFamily:'inherit'}}>
                  {o.amount != null ? 'modifier' : '+ montant'}
                </button>
              </>
            ) : (
              <>
                <input style={{width:70,background:'var(--s2)',border:'1px solid var(--ok)',color:'var(--text)',borderRadius:5,padding:'2px 6px',fontSize:13,fontFamily:'Space Mono,monospace',outline:'none'}}
                  type="number" inputMode="decimal" value={val} autoFocus
                  onChange={e => setVal(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && save()}/>
                <span style={{color:'var(--ok)',fontSize:12}}>EUR</span>
                <button onClick={save} style={{background:'var(--ok)',color:'#000',border:'none',borderRadius:5,padding:'2px 8px',fontSize:11,fontWeight:800,cursor:'pointer'}}>OK</button>
                <button onClick={() => setEditing(false)} style={{background:'transparent',border:'none',color:'var(--muted)',fontSize:11,cursor:'pointer'}}>X</button>
              </>
            )}
            <span style={{color:'var(--ok)',fontSize:11,fontWeight:700}}>LIVRE</span>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="order-row" style={{opacity:.5}}>
      <div className="o-num" style={{color:'var(--ok)'}}>OK</div>
      <div className="o-body">
        <div className="o-client">{o.client}</div>
        <div className="o-addr">{o.displayName || o.address}</div>

        {!editing ? (
          <div style={{display:'flex',alignItems:'center',gap:6,marginTop:3}}>
            {o.amount != null && <span style={{fontSize:10,color:'var(--ok)',fontFamily:'Space Mono,monospace',fontWeight:700}}>[EUR] {fmtEuro(o.amount)}</span>}
            <button onClick={startEdit} style={{background:'transparent',border:'1px solid #3a3a3a',color:'var(--muted)',borderRadius:4,padding:'1px 6px',fontSize:9,cursor:'pointer',fontFamily:'Space Mono,monospace'}}>
              {o.amount != null ? 'modifier modifier' : '+ montant'}
            </button>
            {o.amount != null && (
              <button onClick={() => onUpdate(o.id, {amount:null})} style={{background:'transparent',border:'1px solid #3a3a3a',color:'var(--crit)',borderRadius:4,padding:'1px 6px',fontSize:9,cursor:'pointer',fontFamily:'Space Mono,monospace'}}>X effacer</button>
            )}
          </div>
        ) : (
          <div style={{display:'flex',gap:5,alignItems:'center',marginTop:4}}>
            <input style={{width:80,background:'var(--s2)',border:'1px solid var(--ok)',color:'var(--text)',borderRadius:5,padding:'3px 7px',fontSize:13,fontFamily:'Space Mono,monospace',outline:'none'}}
              type="number" inputMode="decimal" value={val} autoFocus
              onChange={e => setVal(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && save()}/>
            <span style={{color:'var(--ok)',fontSize:12}}>EUR</span>
            <button onClick={save} style={{background:'var(--ok)',color:'#000',border:'none',borderRadius:5,padding:'3px 9px',fontSize:11,fontWeight:800,cursor:'pointer'}}>OK</button>
            <button onClick={() => setEditing(false)} style={{background:'transparent',border:'none',color:'var(--muted)',fontSize:11,cursor:'pointer'}}>X</button>
          </div>
        )}
      </div>
      <button className="btn-sm btn-del" onClick={() => onDelete(o.id)}>X</button>
    </div>
  );
}

function CustomerView({ order, pendingForDriver, depot }) {
  const { ordered: route } = useOptimizedRoute(pendingForDriver, depot);
  const etas = useETAs(route, depot);
  const [now, setNow] = useState(Date.now());

  useEffect(() => {
    const t = setInterval(() => setNow(Date.now()), 30000);
    return () => clearInterval(t);
  }, []);

  const pos = route.findIndex(o => o.id === order.id);
  const calcEta = pos >= 0 ? etas[pos] : null;
  const eta = order.driverEta || calcEta;
  const etaIsConfirmed = !!order.driverEta;
  const isDone = order.status === 'done';

  const posLabel = pos === 0 ? 'Prochaine livraison' :
                   pos === 1 ? '2eme sur la liste' :
                   pos === 2 ? '3eme sur la liste' :
                   pos > 2   ? `${pos + 1}eme sur la liste` : null;

  const etaWait = eta ? eta - now : null;
  const etaWaitTxt = etaWait != null
    ? etaWait <= 0 ? 'Imminent !'
    : etaWait < 60000 ? "Moins d'1 minute"
    : (() => {
      const h = Math.floor(etaWait / 3600000), m = Math.floor((etaWait % 3600000) / 60000);
      return h > 0 ? `${h}h${String(m).padStart(2,'0')}` : `${m} min`;
    })()
    : null;

  return (
    <div style={{padding:20,display:'flex',flexDirection:'column',gap:16,maxWidth:400,margin:'0 auto'}}>
      {isDone ? (
        <div style={{background:'#0a2a1a',border:'2px solid var(--ok)',borderRadius:16,padding:24,textAlign:'center'}}>
          <div style={{fontSize:48,marginBottom:8}}>[OK]</div>
          <div style={{fontSize:22,fontWeight:800,color:'var(--ok)',marginBottom:4}}>Livre !</div>
          <div style={{fontSize:13,color:'var(--muted)'}}>Votre commande a ete livree. Merci !</div>
        </div>
      ) : pos < 0 ? (
        <div style={{background:'var(--s1)',border:'1px solid var(--border)',borderRadius:16,padding:24,textAlign:'center'}}>
          <div style={{fontSize:40,marginBottom:8}}>[ATTENTE]</div>
          <div style={{fontSize:18,fontWeight:800,marginBottom:4}}>En preparation</div>
          <div style={{fontSize:13,color:'var(--muted)'}}>Votre commande est en cours de traitement, elle sera assignee a un livreur tres bientot.</div>
        </div>
      ) : (
        <div style={{background:'var(--s1)',border:'2px solid var(--accent)',borderRadius:16,padding:24,textAlign:'center'}}>
          <div style={{fontSize:40,marginBottom:8}}>[LIV]</div>
          <div style={{fontSize:22,fontWeight:800,marginBottom:4}}>En route !</div>

          {posLabel && (
            <div style={{display:'inline-block',background:'#2a1400',color:'var(--accent)',borderRadius:20,padding:'4px 14px',fontSize:13,fontWeight:700,marginBottom:12}}>
              {posLabel}
            </div>
          )}

          {eta ? (
            <div style={{background:'#001830',border:`1px solid ${etaIsConfirmed ? 'var(--blue)' : '#003a5a'}`,borderRadius:12,padding:16,marginTop:8}}>
              <div style={{fontSize:11,color:'var(--muted)',fontWeight:700,letterSpacing:'1.5px',textTransform:'uppercase',marginBottom:4}}>
                {etaIsConfirmed ? '[ETA] Arrivee confirmee par votre livreur' : "Heure d'arrivee estimee"}
              </div>
              <div style={{fontSize:36,fontWeight:800,color:'var(--blue)',fontFamily:'Space Mono,monospace'}}>{fmtTime(eta)}</div>
              {etaWaitTxt && <div style={{fontSize:13,color:'var(--muted)',marginTop:4}}>dans environ <strong style={{color:'var(--blue)'}}>{etaWaitTxt}</strong></div>}
            </div>
          ) : (
            <div style={{color:'var(--muted)',fontSize:13,marginTop:8}}>
              <span className="spin" style={{marginRight:6}}/> Calcul en cours...
            </div>
          )}
        </div>
      )}

      <div style={{background:'var(--s1)',border:'1px solid var(--border)',borderRadius:14,padding:16}}>
        <div style={{fontSize:10,fontWeight:700,letterSpacing:'2px',textTransform:'uppercase',color:'var(--muted)',marginBottom:12}}>Votre commande</div>
        <div style={{fontWeight:700,fontSize:16,marginBottom:4}}>{order.client}</div>
        <div style={{fontFamily:'Space Mono,monospace',fontSize:11,color:'var(--muted)',marginBottom:8}}>{order.address}</div>
        {order.note && (
          <div style={{background:'#1a1400',border:'1px solid #3a2e00',borderRadius:8,padding:'8px 10px',fontSize:13,color:'var(--warn)',lineHeight:'1.6'}}>
            [NOTE] {order.note}
          </div>
        )}
        <div style={{marginTop:10,paddingTop:10,borderTop:'1px solid var(--border)',fontSize:11,color:'var(--muted)'}}>
          <span>Commande recue a {fmtTime(order.addedAt)}</span>
        </div>
      </div>

      {!isDone && pos >= 0 && (
        <div style={{background:'var(--s1)',border:'1px solid var(--border)',borderRadius:14,padding:16}}>
          <div style={{fontSize:10,fontWeight:700,letterSpacing:'2px',textTransform:'uppercase',color:'var(--muted)',marginBottom:10}}>Progression</div>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            {[...Array(Math.min(route.length, 5))].map((_, i) => (
              <div key={i} style={{
                flex:1,height:6,borderRadius:3,
                background:i < pos ? 'var(--ok)' : i === pos ? 'var(--accent)' : 'var(--border)',
                transition:'background .3s'
              }}/>
            ))}
            {route.length > 5 && <span style={{fontSize:10,color:'var(--muted)'}}>+{route.length - 5}</span>}
          </div>
          <div style={{display:'flex',justifyContent:'space-between',marginTop:6,fontSize:11,color:'var(--muted)'}}>
            <span>{pos} livraison{pos !== 1 ? 's' : ''} avant vous</span>
            <span>{route.length - pos - 1} apres</span>
          </div>
        </div>
      )}
    </div>
  );
}

  return (

        </div>

}

function MeetupView({ meetup, pending, done, onDone, onBack }) {
  const [time, setTime] = useState(new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}));
  const [pendingId, setPending] = useState(null);
  const [amtVal, setAmtVal] = useState('');
  const prevArrivedCount = useRef(pending.filter(o => o.status === 'arrived').length);

  useEffect(() => {
    const t = setInterval(() => setTime(new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})), 30000);
    return () => clearInterval(t);
  }, []);

  useEffect(() => {
    if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission();
  }, []);

  useEffect(() => {
    const arrivedNow = pending.filter(o => o.status === 'arrived').length;
    if (arrivedNow > prevArrivedCount.current) {
      const newest = pending.filter(o => o.status === 'arrived').pop();
      if (newest && Notification.permission === 'granted') {
        new Notification('[GPS] Client sur place !', {body:`${newest.client} est arrive`});
      }
    }
    prevArrivedCount.current = arrivedNow;
  }, [pending]);

  function handleDone(id) {
    setPending(id);
    setAmtVal('');
  }

  function confirm() {
    onDone(pendingId, amtVal !== '' ? parseFloat(amtVal.replace(',', '.')) : null);
    setPending(null);
  }

  function skip() {
    onDone(pendingId, null);
    setPending(null);
  }

  const totalDone = done.reduce((s, o) => s + (parseFloat(o.amount) || 0), 0);
  const waiting = pending.filter(o => o.status !== 'arrived');
  const arrived = pending.filter(o => o.status === 'arrived');

  return (
    <div className="dv-wrap">
      <div className="dv-hdr">
        <div className="dot" style={{background:meetup.color,width:12,height:12}}/>
        <span className="dv-hdr-name">[GPS] {meetup.name}</span>
        {onBack && <button className="dv-back" onClick={onBack}>Retour</button>}
      </div>

      <div className="dv-clock">
        <div><div className="dv-clock-lbl">Heure</div><div>{time}</div></div>
        <div style={{textAlign:'right'}}><div className="dv-clock-lbl">En attente</div><div>{waiting.length}</div></div>
      </div>

      {(meetup.stock > 0 || totalDone > 0) && (
        <div style={{background:'#0a1a0e',border:'1px solid #0f3d25',borderRadius:12,padding:14,marginBottom:14}}>
          <div style={{fontSize:10,fontWeight:700,letterSpacing:'2px',textTransform:'uppercase',color:'var(--muted)',marginBottom:10}}>Bilan journee</div>
          <div style={{display:'flex',gap:8}}>
            {meetup.stock > 0 && (
              <div style={{flex:1,background:'#061a0e',borderRadius:8,padding:'8px 10px',textAlign:'center'}}>
                <div style={{fontSize:9,color:'var(--muted)',fontWeight:700,letterSpacing:'1px',textTransform:'uppercase',marginBottom:3}}>Stock depart</div>
                <div style={{fontFamily:'Space Mono,monospace',fontSize:13,fontWeight:700,color:'var(--muted)'}}>{fmtEuro(meetup.stock)}</div>
              </div>
            )}
            <div style={{flex:1,background:'#061a0e',borderRadius:8,padding:'8px 10px',textAlign:'center'}}>
              <div style={{fontSize:9,color:'var(--muted)',fontWeight:700,letterSpacing:'1px',textTransform:'uppercase',marginBottom:3}}>Encaisse</div>
              <div style={{fontFamily:'Space Mono,monospace',fontSize:13,fontWeight:700,color:'var(--ok)'}}>{fmtEuro(totalDone)}</div>
            </div>
            {meetup.stock > 0 && (
              <div style={{flex:1,background:'#061a0e',borderRadius:8,padding:'8px 10px',textAlign:'center'}}>
                <div style={{fontSize:9,color:'var(--muted)',fontWeight:700,letterSpacing:'1px',textTransform:'uppercase',marginBottom:3}}>Restant</div>
                <div style={{fontFamily:'Space Mono,monospace',fontSize:13,fontWeight:700,color:'var(--blue)'}}>{fmtEuro(Math.max(0, meetup.stock - totalDone))}</div>
              </div>
            )}
          </div>
        </div>
      )}

      {pending.length === 0 && done.length === 0 && <div className="empty-txt">Aucun client pour le moment [OK]</div>}
      {pending.length === 0 && done.length > 0 && <div className="empty-txt" style={{color:'var(--ok)'}}>[TERMINE] Tous les clients ont ete servis !</div>}

      {arrived.map(o => {
        const isPending = pendingId === o.id;

        return (
          <div className="dv-order" key={o.id} style={{border:'2px solid var(--blue)'}}>
            <div style={{background:'#001830',padding:'5px 13px',fontSize:11,color:'var(--blue)',fontWeight:700}}>
              [GPS] CLIENT SUR PLACE
            </div>
            <div className="dv-order-top">
              <div className="dv-n" style={{color:'var(--blue)'}}>!</div>
              <div className="dv-body">
                <div className="dv-client">{o.client}</div>
                {o.note && (
                  <div style={{background:'#1a1400',border:'1px solid #3a2e00',borderRadius:8,padding:'8px 10px',marginBottom:8,fontSize:13,color:'var(--warn)',lineHeight:'1.6',whiteSpace:'pre-wrap'}}>
                    [NOTE] {o.note}
                  </div>
                )}

                {!isPending ? (
                  <button className="dv-done" style={{width:'100%'}} onClick={() => handleDone(o.id)}>OK Client servi</button>
                ) : (
                  <div className="amount-box">
                    <div className="amount-box-lbl">[EUR] Montant encaisse ?</div>
                    <div className="amount-row">
                      <input className="amount-inp" type="number" inputMode="decimal" placeholder="0.00" value={amtVal}
                        onChange={e => setAmtVal(e.target.value)}
                        onKeyDown={e => e.key === 'Enter' && confirm()}
                        autoFocus/>
                      <span style={{color:'var(--ok)',fontWeight:700,fontSize:16}}>EUR</span>
                      <button className="amount-confirm" onClick={confirm}>OK OK</button>
                      <button className="amount-skip" onClick={skip}>Passer</button>
                    </div>
                  </div>
                )}
              </div>
            </div>
            <div className="dv-order-footer">
              <span className="dv-added">Recu {fmtTime(o.addedAt)}</span>
              <span className={`badge b-${urgency(o.deadline)}`}>{fmtCountdown(o.deadline)}</span>
            </div>
          </div>
        );
      })}

      {waiting.length > 0 && (
        <>
          {arrived.length > 0 && (
            <div style={{margin:'12px 0 6px',fontSize:10,color:'var(--muted)',letterSpacing:'2px',textTransform:'uppercase',fontWeight:700,textAlign:'center'}}>
              En attente
            </div>
          )}

          {waiting.map((o, i) => (
            <div className="dv-order" key={o.id}>
              <div className="dv-order-top">
                <div className="dv-n">{i + 1}</div>
                <div className="dv-body">
                  <div className="dv-client">{o.client}</div>
                  {o.note && (
                    <div style={{background:'#1a1400',border:'1px solid #3a2e00',borderRadius:8,padding:'8px 10px',fontSize:13,color:'var(--warn)',lineHeight:'1.6',whiteSpace:'pre-wrap'}}>
                      [NOTE] {o.note}
                    </div>
                  )}
                </div>
              </div>
              <div className="dv-order-footer">
                <span className="dv-added">Recu {fmtTime(o.addedAt)}</span>
                <span className={`badge b-${urgency(o.deadline)}`}>{fmtCountdown(o.deadline)}</span>
              </div>
            </div>
          ))}
        </>
      )}

      {done.length > 0 && (
        <>
          <div style={{margin:'16px 0 8px',fontSize:10,color:'var(--muted)',letterSpacing:'2px',textTransform:'uppercase',fontWeight:700,textAlign:'center'}}>
            OK Deja servis
          </div>

          {done.map(o => (
            <div className="dv-order done" key={o.id}>
              <div className="dv-order-top">
                <div className="dv-n" style={{color:'var(--ok)'}}>OK</div>
                <div className="dv-body">
                  <div className="dv-client">{o.client}</div>
                  {o.note && <div style={{fontSize:11,color:'var(--muted)',marginTop:4}}>[NOTE] {o.note}</div>}
                </div>
              </div>
              <div className="dv-order-footer">
                <span className="dv-added">Servi - {fmtTime(o.addedAt)}</span>
                {o.amount != null && <span style={{fontFamily:'Space Mono,monospace',fontSize:12,color:'var(--ok)',fontWeight:700}}>{fmtEuro(o.amount)}</span>}
              </div>
            </div>
          ))}
        </>
      )}

      <div style={{height:20}}/>
    </div>
  );
}

// ============================================================
// HISTORY
// ============================================================
function HistoryView() {
  const [history, setHistory] = useState({});

  useEffect(() => {
    dbOn('history', v => setHistory(v || {}));
  }, []);

  const entries = Object.entries(history).sort((a, b) => (b[1].savedAt || 0) - (a[1].savedAt || 0));

  return (
    <div className="content">
      <div style={{fontSize:10,fontWeight:700,letterSpacing:'2.5px',textTransform:'uppercase',color:'var(--muted)',padding:'4px 0 8px'}}>
        Historique des journees
      </div>

      {entries.length === 0 && <div className="empty-txt">Aucun historique - il apparaitra apres le premier reset journee</div>}

      {entries.map(([id, snap]) => {
        const orders = snap.orders || [];
        const done = orders.filter(o => o.status === 'done');
        const total = done.reduce((s, o) => s + (parseFloat(o.amount) || 0), 0);

        return (
          <div className="card" key={id}>
            <div className="route-hdr">
              <span className="route-hdr-name">[DATE] {snap.date}</span>
              <span className="route-hdr-n">{done.length}/{orders.length} livrees</span>
            </div>

            {total > 0 && <div className="route-total">[EUR] Total encaisse : {fmtEuro(total)}</div>}

            {done.map((o, i) => (
              <div className="order-row" key={i} style={{opacity:.7}}>
                <div className="o-num" style={{color:'var(--ok)'}}>OK</div>
                <div className="o-body">
                  <div className="o-client">{o.client}</div>
                  <div className="o-addr">{o.address}</div>
                  {o.amount != null && <div style={{fontSize:10,color:'var(--ok)',marginTop:2}}>[EUR] {fmtEuro(o.amount)}</div>}
                </div>
              </div>
            ))}
          </div>
        );
      })}

      <div style={{height:20}}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
