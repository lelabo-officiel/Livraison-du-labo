<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ═══ PALETTE & CONSTANTES ═══════════════════════════════════
const PALETTE = ['#FF6B00','#00C4FF','#06D6A0','#FFD60A','#C77DFF','#FF4D6D'];
const DEADLINE_MS = 3 * 60 * 60 * 1000;

// ═══ UTILS ══════════════════════════════════════════════════
function haversine(a, b) {
  if (!a?.lat || !b?.lat) return Infinity;
  const R = 6371, toR = x => x * Math.PI / 180;
  const dLat = toR(b.lat - a.lat), dLng = toR(b.lng - a.lng);
  const aa = Math.sin(dLat/2)**2 + Math.cos(toR(a.lat))*Math.cos(toR(b.lat))*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(aa), Math.sqrt(1-aa));
}

function optimizeRoute(orders, startPos = null) {
  const ready = orders.filter(o => o.status !== 'done');
  if (ready.length <= 1) return ready;
  const now = Date.now();
  let rem = [...ready], route = [], pos = startPos;
  while (rem.length) {
    const urgent = rem.filter(o => o.deadline - now < 80*60000).sort((a,b) => a.deadline - b.deadline);
    const pool = urgent.length ? urgent : rem.slice().sort((a,b) => a.deadline - b.deadline);
    let pick;
    if (pos && pool.length > 1) {
      const win = pool.filter(o => o.deadline - pool[0].deadline < 25*60000);
      pick = win.reduce((best, o) => haversine(pos, o) < haversine(pos, best) ? o : best);
    } else pick = pool[0];
    route.push(pick); pos = pick; rem = rem.filter(o => o.id !== pick.id);
  }
  return route;
}

async function geocodeAddress(address) {
  const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(address)}&format=json&limit=1`,
    { headers: {'Accept-Language':'fr-FR','User-Agent':'LivraisonApp/1.0'} });
  const data = await res.json();
  if (!data.length) throw new Error('Adresse non trouvée');
  return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon), displayName: data[0].display_name };
}

const fmtTime = ts => new Date(ts).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
const fmtCountdown = deadline => {
  const d = deadline - Date.now();
  if (d <= 0) return 'EN RETARD';
  const h = Math.floor(d/3600000), m = Math.floor((d%3600000)/60000);
  return h > 0 ? `${h}h${String(m).padStart(2,'0')}` : `${m}min`;
};
const urgencyLevel = deadline => {
  const d = deadline - Date.now();
  if (d <= 0) return 'late'; if (d < 45*60000) return 'critical';
  if (d < 90*60000) return 'warn'; return 'ok';
};
const wazeUrl = o => o.lat && o.lng
  ? `https://waze.com/ul?ll=${o.lat},${o.lng}&navigate=yes`
  : `https://waze.com/ul?q=${encodeURIComponent(o.address)}&navigate=yes`;

// ═══ FIREBASE HELPERS ═══════════════════════════════════════
function dbRef(path) { return window._dbRef(window._db, path); }
function dbSet(path, val) { return window._dbSet(dbRef(path), val); }
function dbUpd(path, val) { return window._dbUpd(dbRef(path), val); }
function dbPush(path, val) { return window._dbPush(dbRef(path), val); }
function dbRem(path) { return window._dbRem(dbRef(path)); }
function dbOn(path, cb) { return window._dbOn(dbRef(path), snap => cb(snap.val())); }

// ═══ TOAST ══════════════════════════════════════════════════
function Toast({ msg, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 2000); return () => clearTimeout(t); }, []);
  return <div className="toast">{msg}</div>;
}

// ═══ APP ════════════════════════════════════════════════════
function App() {
  const [fbReady, setFbReady] = useState(!!window._firebaseReady);
  const [fbConfigured, setFbConfigured] = useState(true);
  const [drivers, setDrivers] = useState({});
  const [orders, setOrders]   = useState({});
  const [screen, setScreen]   = useState(() => {
    const h = window.location.hash;
    return h.startsWith('#driver-') ? h.slice(1) : 'admin';
  });
  const [toast, setToast] = useState('');
  const [, setTick] = useState(0);

  useEffect(() => {
    if (!fbReady) { window.addEventListener('firebaseReady', () => setFbReady(true)); }
  }, []);

  useEffect(() => { const t = setInterval(() => setTick(n=>n+1), 30000); return () => clearInterval(t); }, []);

  useEffect(() => {
    if (!fbReady) return;
    // Test if config is placeholder
    try {
      const unsub1 = dbOn('drivers', v => setDrivers(v || {}));
      const unsub2 = dbOn('orders',  v => setOrders(v  || {}));
      setFbConfigured(true);
    } catch(e) { setFbConfigured(false); }
  }, [fbReady]);

  useEffect(() => {
    if (screen.startsWith('driver-')) window.location.hash = screen;
    else history.replaceState(null,'',window.location.pathname);
  }, [screen]);

  const showToast = msg => { setToast(msg); };

  // ── Drivers ──────────────────────────────────────────────
  async function addDriver(name) {
    if (!name.trim()) return;
    const color = PALETTE[Object.keys(drivers).length % PALETTE.length];
    await dbPush('drivers', { name: name.trim(), color });
  }
  async function removeDriver(id) {
    await dbRem(`drivers/${id}`);
    Object.entries(orders).forEach(([oid, o]) => {
      if (o.driverId === id) dbUpd(`orders/${oid}`, { driverId: null });
    });
  }
  async function updateDriver(id, patch) { await dbUpd(`drivers/${id}`, patch); }

  // ── Orders ───────────────────────────────────────────────
  async function addOrder(order) { await dbPush('orders', order); }
  async function updateOrder(id, patch) { await dbUpd(`orders/${id}`, patch); }
  async function deleteOrder(id) { await dbRem(`orders/${id}`); }

  // ── Route ────────────────────────────────────────────────
  function getRoute(driverId) {
    const driver = drivers[driverId];
    const startPos = driver?.baseLat ? { lat: driver.baseLat, lng: driver.baseLng } : null;
    const dOrders = Object.entries(orders)
      .filter(([,o]) => o.driverId === driverId && o.status !== 'done')
      .map(([id,o]) => ({...o, id}));
    return optimizeRoute(dOrders, startPos);
  }

  function getDoneOrders(driverId) {
    return Object.entries(orders)
      .filter(([,o]) => o.driverId === driverId && o.status === 'done')
      .map(([id,o]) => ({...o, id}))
      .sort((a,b) => b.addedAt - a.addedAt); // plus récent en premier
  }

  if (!fbReady) return (
    <div className="app"><div className="empty-txt" style={{marginTop:60}}>
      <div className="spin" style={{width:24,height:24,margin:'0 auto 12px'}}/> Connexion à Firebase…
    </div></div>
  );

  const isDriverScreen = screen.startsWith('driver-');
  const driverId = isDriverScreen ? screen.replace('driver-','') : null;
  const currentDriver = driverId ? drivers[driverId] : null;
  const isDirectLink = isDriverScreen && !!window.location.hash;

  // Vue chauffeur directe (lien envoyé)
  if (isDirectLink && currentDriver) return (
    <div className="app">
      <header className="hdr"><span className="hdr-logo">LIVR<em>AI</em>SON</span></header>
      <DriverView driver={{...currentDriver, id: driverId}}
        route={getRoute(driverId)} doneOrders={getDoneOrders(driverId)}
        onDone={id => updateOrder(id, {status:'done'})} onBack={null} />
      {toast && <Toast msg={toast} onDone={() => setToast('')}/>}
    </div>
  );

  return (
    <div className="app">
      <header className="hdr">
        <span className="hdr-logo">LIVR<em>AI</em>SON</span>
        {isDriverScreen ? (
          <button className="tab on" onClick={() => setScreen('driver-select')}>← Retour</button>
        ) : (
          <>
            <button className={`tab ${screen==='admin'?'on':''}`} onClick={() => setScreen('admin')}>Admin</button>
            <button className={`tab ${screen!=='admin'?'on':''}`} onClick={() => setScreen('driver-select')}>Chauffeur</button>
          </>
        )}
      </header>

      {screen === 'admin' && (
        <AdminView drivers={drivers} orders={orders} getRoute={getRoute}
          addDriver={addDriver} removeDriver={removeDriver} updateDriver={updateDriver}
          addOrder={addOrder} updateOrder={updateOrder} deleteOrder={deleteOrder}
          onToast={showToast} />
      )}
      {screen === 'driver-select' && (
        <SelectDriver drivers={drivers} orders={orders} onSelect={id => setScreen(`driver-${id}`)} />
      )}
      {isDriverScreen && currentDriver && (
        <DriverView driver={{...currentDriver, id: driverId}}
          route={getRoute(driverId)} doneOrders={getDoneOrders(driverId)}
          onDone={id => updateOrder(id, {status:'done'})} onBack={() => setScreen('driver-select')} />
      )}
      {toast && <Toast msg={toast} onDone={() => setToast('')}/>}
    </div>
  );
}

// ═══ ADMIN VIEW ═════════════════════════════════════════════
function AdminView({ drivers, orders, getRoute, addDriver, removeDriver, updateDriver, addOrder, updateOrder, deleteOrder, onToast }) {
  const [newName, setNewName] = useState('');
  const [form, setForm] = useState({ client:'', address:'', driverId:'', note:'' });
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');

  async function handleAdd() {
    if (!form.client.trim() || !form.address.trim()) return;
    setLoading(true); setErr('');
    const ts = Date.now();
    const order = {
      client: form.client.trim(), address: form.address.trim(),
      note: form.note.trim(), driverId: form.driverId || null,
      addedAt: ts, deadline: ts + DEADLINE_MS,
      status: 'pending', lat: null, lng: null, displayName: null
    };
    const pushed = await dbPush('orders', order);
    const newKey = pushed.key;
    setForm({ client:'', address:'', driverId:'', note:'' });
    try {
      const geo = await geocodeAddress(order.address);
      await updateOrder(newKey, { lat: geo.lat, lng: geo.lng, displayName: geo.displayName });
    } catch(e) { setErr(`GPS non trouvé — commande ajoutée quand même`); }
    finally { setLoading(false); }
  }

  const unassigned = Object.entries(orders).filter(([,o]) => !o.driverId && o.status !== 'done');

  return (
    <div className="content">
      {/* NOUVELLE COMMANDE */}
      <div className="card">
        <div className="card-pad">
          <div className="sec-label">Nouvelle commande</div>
          <div className="fld">
            <label className="fld-lbl">Nom du client</label>
            <input className="inp" placeholder="Ex : Mohammed D." value={form.client}
              onChange={e => setForm(f=>({...f, client:e.target.value}))} />
          </div>
          <div className="fld">
            <label className="fld-lbl">Adresse de livraison</label>
            <input className="inp" placeholder="Ex : 14 rue de la Paix, Lyon" value={form.address}
              onChange={e => setForm(f=>({...f, address:e.target.value}))}
              onKeyDown={e => e.key==='Enter' && handleAdd()} />
          </div>
          <div className="fld">
            <label className="fld-lbl">Chauffeur</label>
            <select className="inp" value={form.driverId} onChange={e => setForm(f=>({...f, driverId:e.target.value}))}>
              <option value="">— Non assigné</option>
              {Object.entries(drivers).map(([id,d]) => <option key={id} value={id}>{d.name}</option>)}
            </select>
          </div>
          <div className="fld">
            <label className="fld-lbl">Message pour le livreur</label>
            <textarea className="inp" rows={3} value={form.note}
              placeholder="Ex : 2x burger, 1x frites — 24€ — code: 1492"
              onChange={e => setForm(f=>({...f, note:e.target.value}))}
              style={{resize:'none',lineHeight:'1.5'}}/>
          </div>
          {loading && <div className="geocoding-row"><span className="spin"/> Localisation GPS…</div>}
          {err && <div className="err">⚠ {err}</div>}
          <button className="btn-main" onClick={handleAdd} disabled={!form.client.trim()||!form.address.trim()||loading}>
            + Ajouter la commande
          </button>
        </div>
      </div>

      {/* CHAUFFEURS */}
      <div className="card">
        <div className="card-pad" style={{paddingBottom:0}}>
          <div className="sec-label">Chauffeurs ({Object.keys(drivers).length})</div>
        </div>
        {Object.keys(drivers).length === 0 && <div className="empty-txt">Aucun chauffeur</div>}
        {Object.entries(drivers).map(([id,d]) => {
          const n = Object.values(orders).filter(o => o.driverId===id && o.status!=='done').length;
          const link = `${window.location.href.split('#')[0]}#driver-${id}`;
          return (
            <div key={id}>
              <div className="driver-row">
                <div className="dot" style={{background:d.color}}/>
                <span className="driver-row-name">{d.name}</span>
                <span className="driver-row-n">{n} cmd</span>
                <button className="btn-sm" style={{color:'#06D6A0'}} onClick={() => {
                  navigator.clipboard.writeText(link);
                  onToast('🔗 Lien copié !');
                }}>🔗 Lien</button>
                <button className="btn-sm btn-del" onClick={() => removeDriver(id)}>✕</button>
              </div>
              <DriverBaseRow driver={{...d, id}} onUpdate={updateDriver} />
            </div>
          );
        })}
        <div className="add-row">
          <input className="add-inp" placeholder="Prénom du chauffeur" value={newName}
            onChange={e => setNewName(e.target.value)}
            onKeyDown={e => { if(e.key==='Enter'&&newName.trim()){addDriver(newName);setNewName('');} }} />
          <button className="btn-add" onClick={() => { if(newName.trim()){addDriver(newName);setNewName('');} }}>+ Ajouter</button>
        </div>
      </div>

      {/* NON ASSIGNÉES */}
      {unassigned.length > 0 && (
        <div className="card">
          <div className="card-pad" style={{paddingBottom:0}}>
            <div className="sec-label">⚠ Non assignées ({unassigned.length})</div>
          </div>
          {unassigned.map(([id,o]) => (
            <div className="unassigned-row" key={id}>
              <div className="u-info">
                <div className="u-client">{o.client}</div>
                <div className="u-addr">{o.address}</div>
              </div>
              <div style={{display:'flex',gap:6}}>
                <select className="btn-sm" style={{color:'var(--accent)'}} value="" onChange={e => { if(e.target.value) updateOrder(id,{driverId:e.target.value}); }}>
                  <option value="">Assigner →</option>
                  {Object.entries(drivers).map(([did,d]) => <option key={did} value={did}>{d.name}</option>)}
                </select>
                <button className="btn-sm btn-del" onClick={() => deleteOrder(id)}>✕</button>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* ROUTES PAR CHAUFFEUR */}
      {Object.entries(drivers).map(([id,d]) => {
        const route = getRoute(id);
        const doneOrders = getDoneOrders(id);
        return (
          <div className="card" key={id}>
            <div className="route-hdr">
              <div className="dot" style={{background:d.color}}/>
              <span className="route-hdr-name">{d.name}</span>
              <span className="route-hdr-n">{route.length} à livrer{doneOrders.length>0?` · ${doneOrders.length} ✓`:''}</span>
            </div>
            {route.length===0 && doneOrders.length===0 && <div className="empty-txt">Aucune commande assignée</div>}
            {route.map((o,i) => {
              const u = urgencyLevel(o.deadline);
              return (
                <div className="order-row" key={o.id}>
                  <div className="o-num">{i+1}</div>
                  <div className="o-body">
                    <div className="o-client">{o.client}</div>
                    <div className="o-addr">{o.displayName||o.address}</div>
                    <div className="o-meta">
                      <span className="o-time">↓ {fmtTime(o.addedAt)}</span>
                      <span className={`badge b-${u}`}>{fmtCountdown(o.deadline)} · {fmtTime(o.deadline)}</span>
                    </div>
                  </div>
                  <div className="o-actions">
                    <a className="btn-sm" href={wazeUrl(o)} target="_blank" style={{color:'#4FC3F7',textDecoration:'none'}}>Waze</a>
                    <select className="btn-sm" value={id} onChange={e => updateOrder(o.id,{driverId:e.target.value||null})} style={{fontSize:'9px'}}>
                      {Object.entries(drivers).map(([did,dr]) => <option key={did} value={did}>{dr.name}</option>)}
                      <option value="">Non assigné</option>
                    </select>
                    <button className="btn-sm btn-del" onClick={() => deleteOrder(o.id)}>✕</button>
                  </div>
                </div>
              );
            })}
            {doneOrders.length > 0 && (
              <>
                <div style={{padding:'6px 14px',background:'#0d0d0d',borderTop:'1px solid var(--border)',fontSize:10,color:'var(--muted)',letterSpacing:'1.5px',textTransform:'uppercase',fontWeight:700}}>
                  ✓ Livrées
                </div>
                {doneOrders.map(o => (
                  <div className="order-row" key={o.id} style={{opacity:.4}}>
                    <div className="o-num" style={{color:'var(--ok)'}}>✓</div>
                    <div className="o-body">
                      <div className="o-client">{o.client}</div>
                      <div className="o-addr">{o.displayName||o.address}</div>
                    </div>
                    <button className="btn-sm btn-del" onClick={() => deleteOrder(o.id)}>✕</button>
                  </div>
                ))}
              </>
            )}
          </div>
        );
      })}
      <div style={{height:20}}/>
    </div>
  );
}

// ═══ DRIVER BASE ROW ════════════════════════════════════════
function DriverBaseRow({ driver, onUpdate }) {
  const [editing, setEditing] = useState(false);
  const [val, setVal] = useState(driver.baseAddress || '');
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');

  async function save() {
    if (!val.trim()) return;
    setLoading(true); setErr('');
    try {
      const geo = await geocodeAddress(val.trim());
      await onUpdate(driver.id, { baseAddress:val.trim(), baseLat:geo.lat, baseLng:geo.lng });
      setEditing(false);
    } catch(e) { setErr('Adresse non trouvée'); }
    finally { setLoading(false); }
  }

  return (
    <div style={{padding:'0 14px 10px',borderBottom:'1px solid var(--border)'}}>
      {!editing ? (
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:11,color:driver.baseLat?'var(--ok)':'var(--muted)'}}>
            {driver.baseLat ? `📍 Départ : ${driver.baseAddress}` : '📍 Aucun point de départ'}
          </span>
          <button className="btn-sm" onClick={() => { setVal(driver.baseAddress||''); setEditing(true); }}>
            {driver.baseLat ? 'Modifier' : '+ Définir'}
          </button>
        </div>
      ) : (
        <div style={{display:'flex',flexDirection:'column',gap:6}}>
          <div style={{display:'flex',gap:6}}>
            <input className="add-inp" style={{fontSize:13}} autoFocus
              placeholder="Adresse de départ" value={val}
              onChange={e => setVal(e.target.value)}
              onKeyDown={e => e.key==='Enter' && save()} />
            <button className="btn-add" onClick={save} disabled={loading||!val.trim()}>{loading?'…':'✓'}</button>
            <button className="btn-sm" onClick={() => setEditing(false)}>✕</button>
          </div>
          {err && <span style={{fontSize:11,color:'var(--crit)'}}>{err}</span>}
        </div>
      )}
    </div>
  );
}

// ═══ SELECT DRIVER ══════════════════════════════════════════
function SelectDriver({ drivers, orders, onSelect }) {
  return (
    <div className="sel-wrap">
      <div className="sel-title">Qui es-tu ?</div>
      <div className="sel-sub">Sélectionne ton nom pour voir ta route</div>
      {Object.keys(drivers).length===0 && <div className="empty-txt">Aucun chauffeur configuré</div>}
      {Object.entries(drivers).map(([id,d]) => {
        const n = Object.values(orders).filter(o => o.driverId===id && o.status!=='done').length;
        return (
          <button className="driver-sel-btn" key={id} onClick={() => onSelect(id)}>
            <div className="dot" style={{background:d.color,width:14,height:14}}/>
            <div>
              <span className="driver-sel-name">{d.name}</span>
              <span className="driver-sel-count">{n} livraison{n!==1?'s':''} en attente</span>
            </div>
          </button>
        );
      })}
    </div>
  );
}

// ═══ DRIVER VIEW ════════════════════════════════════════════
function DriverView({ driver, route, doneOrders = [], onDone, onBack }) {
  const [time, setTime] = useState(new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}));
  useEffect(() => {
    const t = setInterval(() => setTime(new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})), 30000);
    return () => clearInterval(t);
  }, []);

  return (
    <div className="dv-wrap">
      <div className="dv-hdr">
        <div className="dot" style={{background:driver.color,width:12,height:12}}/>
        <span className="dv-hdr-name">{driver.name}</span>
        {onBack && <button className="dv-back" onClick={onBack}>← Changer</button>}
      </div>
      <div className="dv-clock">
        <div><div className="dv-clock-lbl">Heure</div><div>{time}</div></div>
        <div style={{textAlign:'right'}}>
          <div className="dv-clock-lbl">Restantes</div>
          <div>{route.length}</div>
        </div>
      </div>
      {route.length===0 && doneOrders.length===0 && <div className="empty-txt">Aucune livraison pour le moment 👍</div>}
      {route.length===0 && doneOrders.length>0 && (
        <div className="empty-txt" style={{color:'var(--ok)'}}>🎉 Toutes les livraisons sont terminées !</div>
      )}

      {/* COMMANDES ACTIVES — ordre optimisé */}
      {route.map((o,i) => {
        const u = urgencyLevel(o.deadline);
        return (
          <div className="dv-order" key={o.id}>
            <div className="dv-order-top">
              <div className="dv-n">{i+1}</div>
              <div className="dv-body">
                <div className="dv-client">{o.client}</div>
                <div className="dv-addr">{o.displayName||o.address}</div>
                {o.note ? (
                  <div style={{background:'#1a1400',border:'1px solid #3a2e00',borderRadius:8,padding:'8px 10px',marginBottom:10,fontSize:13,color:'#FFD60A',lineHeight:'1.6',whiteSpace:'pre-wrap'}}>
                    📋 {o.note}
                  </div>
                ) : null}
                <div className="dv-btns">
                  <a className="dv-maps" href={wazeUrl(o)} target="_blank">🚗 Waze</a>
                  <button className="dv-done" onClick={() => onDone(o.id)}>✓ Livré</button>
                </div>
              </div>
            </div>
            <div className="dv-order-footer">
              <span className="dv-added">Reçu {fmtTime(o.addedAt)}</span>
              <span className={`badge b-${u}`}>avant {fmtTime(o.deadline)} · {fmtCountdown(o.deadline)}</span>
            </div>
          </div>
        );
      })}

      {/* COMMANDES LIVRÉES — en bas, grises */}
      {doneOrders.length > 0 && (
        <>
          <div style={{margin:'16px 0 8px',fontSize:10,color:'var(--muted)',letterSpacing:'2px',textTransform:'uppercase',fontWeight:700,textAlign:'center'}}>
            ✓ Déjà livrées
          </div>
          {doneOrders.map(o => (
            <div className="dv-order done" key={o.id}>
              <div className="dv-order-top">
                <div className="dv-n" style={{color:'var(--ok)'}}>✓</div>
                <div className="dv-body">
                  <div className="dv-client">{o.client}</div>
                  <div className="dv-addr">{o.displayName||o.address}</div>
                  {o.note ? (
                    <div style={{fontSize:11,color:'var(--muted)',marginTop:4}}>📋 {o.note}</div>
                  ) : null}
                </div>
              </div>
              <div className="dv-order-footer">
                <span className="dv-added">Livré — reçu {fmtTime(o.addedAt)}</span>
                <span style={{color:'var(--ok)',fontSize:11,fontWeight:700}}>LIVRÉ</span>
              </div>
            </div>
          ))}
        </>
      )}
      <div style={{height:20}}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body>
